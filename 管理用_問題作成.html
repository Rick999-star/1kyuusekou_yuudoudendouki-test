      function deleteTestsByIds(ids) {
        const removeSet = new Set((ids || []).filter(Boolean));
        if (!removeSet.size) return;

        const nextTests = state.tests.filter((item) => !removeSet.has(item.id));
        const activeRemoved = state.activeTestId && removeSet.has(state.activeTestId);
        state.tests = nextTests;
        state.selectedTestGroupIds = [];

        if (activeRemoved) {
          state.activeTestId = null;
          state.responses = {};
          state.result = null;
          state.formulaDrafts = {};
          state.formulaModal = null;
        }

        const nextSelectedTest = nextTests.find((item) => item.id === state.selectedTestId) || nextTests[0] || null;
        state.selectedTestId = nextSelectedTest ? nextSelectedTest.id : null;
        state.selectedQuestionId = nextSelectedTest && nextSelectedTest.questions[0] ? nextSelectedTest.questions[0].id : null;
        saveState();
        render();
      }

      function bindAdminEvents() {
        document.getElementById("setting-public-url").oninput = (event) => {
          state.settings.aiServicePublicUrl = event.target.value;
          saveState();
        };

        document.getElementById("setting-difficulty").onchange = (event) => {
          state.settings.defaultDifficultyPreset = event.target.value;
          saveState();
        };

        document.getElementById("generation-audience").onchange = (event) => {
          state.settings.generationAudience = event.target.value;
          saveState();
        };

        document.getElementById("setting-prompt").oninput = (event) => {
          state.settings.aiScoringPrompt = event.target.value;
          saveState();
        };

        document.getElementById("save-password").onclick = () => {
          const current = document.getElementById("current-password").value;
          const next = document.getElementById("new-password").value;
          const confirm = document.getElementById("confirm-password").value;

          if (current !== state.settings.adminPassword) {
            state.settingsMessage = "現在の管理者パスワードが一致しません。";
          } else if (!next.trim()) {
            state.settingsMessage = "新しいパスワードを入力してください。";
          } else if (next !== confirm) {
            state.settingsMessage = "新しいパスワード確認が一致しません。";
          } else {
            state.settings.adminPassword = next;
            state.settingsMessage = "管理者パスワードを更新しました。";
            saveState();
          }

          render();
        };

        document.getElementById("reference-file").onchange = async (event) => {
          const file = event.target.files[0];
          if (!file) return;
          state.referenceFileName = file.name;

          if (file.type.startsWith("text/") || /\.(txt|md|csv|json|tex)$/i.test(file.name)) {
            state.referenceText = await file.text();
            state.referenceStatus = file.name + " の本文を読み込みました。";
          } else {
            state.referenceText =
              "参照ファイル名: " + file.name + "\nMVPではこの形式の本文抽出は未実装です。";
            state.referenceStatus = file.name + " は本文抽出未対応のため、ファイル名ベースのモック生成を行います。";
          }

          render();
        };

        document.getElementById("generate-questions").onclick = () => {
          if (!state.referenceFileName) {
            state.referenceStatus = "先に参照ファイルを選んでください。";
            render();
            return;
          }

          const draft = generateQuestions(state.referenceText);
          draft.sourceTopic = inferThemeFromText(state.referenceFileName) || draft.sourceTopic || dominantTopicForTest(draft);
          draft.id = createId("TEST");
          draft.title = buildGeneratedTestTitle(state.referenceFileName, draft);
          ensureTestQuestionPool(draft);
          draft.questionPool.forEach(repairQuestionRecord);
          draft.questions.forEach(repairQuestionRecord);
          state.tests.unshift(draft);
          state.selectedTestGroupIds = [];
          state.selectedTestId = draft.id;
          state.selectedQuestionId = draft.questions[0] ? draft.questions[0].id : null;
          const poolCount = Array.isArray(draft.questionPool) ? draft.questionPool.length : draft.questions.length;
          state.referenceStatus =
            state.referenceFileName +
            " から " +
            poolCount +
            " 問を候補として読み込み、" +
            draft.questions.length +
            " 問をセットしました。難易度設定は「" +
            PRESET_LABELS[state.settings.defaultDifficultyPreset] +
            "」、問題のやさしさは「" +
            GENERATION_AUDIENCE_LABELS[state.settings.generationAudience] +
            "」です。";
          saveState();
          render();
        };

        document.getElementById("export-json").onclick = () => {
          const blob = new Blob([JSON.stringify({ tests: state.tests, settings: state.settings }, null, 2)], {
            type: "application/json"
          });
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = "tests.json";
          anchor.click();
          URL.revokeObjectURL(url);
        };

        const exportManagementHtmlButton = document.getElementById("export-management-html");
        if (exportManagementHtmlButton) {
          exportManagementHtmlButton.onclick = () => {
            exportManagementHtml();
          };
        }

        const importJsonButton = document.getElementById("import-json");
        const importJsonFile = document.getElementById("import-json-file");
        if (importJsonButton && importJsonFile) {
          importJsonButton.onclick = () => {
            importJsonFile.value = "";
            importJsonFile.click();
          };
          importJsonFile.onchange = async (event) => {
            const file = event.target.files && event.target.files[0];
            if (!file) return;
            try {
              const raw = await file.text();
              const parsed = JSON.parse(raw);
              importStateFromJsonData(parsed);
            } catch (error) {
              state.referenceStatus = "JSONの読み込みに失敗しました。管理画面から書き出したJSONを選んでください。";
              render();
            }
          };
        }

        const exportPublicHtmlButton = document.getElementById("export-public-html");
        if (exportPublicHtmlButton) {
          exportPublicHtmlButton.onclick = () => {
            exportPublicHtml();
          };
        }

        document.querySelectorAll("[data-test-id]").forEach((button) => {
          button.onclick = () => {
            state.selectedTestId = button.dataset.testId;
            state.selectedQuestionId = null;
            render();
          };
        });

        const test = selectedTest();
        if (!test) return;

        const toggleDeleteSelectionButton = document.getElementById("toggle-delete-selection");
        if (toggleDeleteSelectionButton) {
          toggleDeleteSelectionButton.onclick = () => {
            if (state.selectedTestGroupIds.includes(test.id)) {
              state.selectedTestGroupIds = state.selectedTestGroupIds.filter((id) => id !== test.id);
            } else {
              state.selectedTestGroupIds = state.selectedTestGroupIds.concat(test.id);
            }
            render();
          };
        }

        const deleteSelectedTestsButton = document.getElementById("delete-selected-tests");
        if (deleteSelectedTestsButton) {
          deleteSelectedTestsButton.onclick = () => {
            deleteTestsByIds(state.selectedTestGroupIds);
          };
        }

        document.getElementById("test-title").oninput = (event) => {
          test.title = event.target.value;
          saveState();
        };
        document.getElementById("test-description").oninput = (event) => {
          test.description = event.target.value;
          saveState();
        };
        document.getElementById("test-reference").oninput = (event) => {
          test.referenceSummary = event.target.value;
          saveState();
        };
        document.getElementById("test-published").onchange = (event) => {
          test.published = event.target.checked;
          saveState();
          render();
        };
        document.getElementById("delete-test").onclick = () => {
          deleteTestsByIds([test.id]);
        };
        document.getElementById("score-multiple-choice").oninput = (event) => {
          test.scoringConfig.multiple_choice = Math.max(1, Number(event.target.value) || 1);
          saveState();
        };
        document.getElementById("score-fill-blank").oninput = (event) => {
          test.scoringConfig.fill_blank = Math.max(1, Number(event.target.value) || 1);
          saveState();
        };
        document.getElementById("score-written").oninput = (event) => {
          test.scoringConfig.written = Math.max(1, Number(event.target.value) || 1);
          saveState();
        };
        document.getElementById("score-formula").oninput = (event) => {
          test.scoringConfig.formula = Math.max(1, Number(event.target.value) || 1);
          saveState();
        };
        document.getElementById("test-question-count").onchange = (event) => {
          test.questionSelectionCount = clampQuestionSelectionCount(event.target.value, test.questionPool.length);
          saveState();
        };
        document.getElementById("apply-question-count").onclick = () => {
          applyQuestionSelection(test, false);
          state.selectedQuestionId = test.questions[0] ? test.questions[0].id : null;
          saveState();
          render();
        };
        document.getElementById("shuffle-questions").onclick = () => {
          applyQuestionSelection(test, true);
          state.selectedQuestionId = test.questions[0] ? test.questions[0].id : null;
          saveState();
          render();
        };

        document.querySelectorAll("[data-add-type]").forEach((button) => {
          button.onclick = () => {
            const nextQuestion = emptyQuestionByType(button.dataset.addType);
            ensureTestQuestionPool(test);
            test.questionPool.push(nextQuestion);
            test.questions.push(nextQuestion);
            test.questionSelectionCount = test.questions.length;
            state.selectedQuestionId = nextQuestion.id;
            saveState();
            render();
          };
        });

        document.querySelectorAll("[data-question-id]").forEach((button) => {
          button.onclick = () => {
            state.selectedQuestionId = button.dataset.questionId;
            render();
          };
        });

        const question = selectedQuestion();
        if (!question) return;
        document.getElementById("delete-question").onclick = () => {
          test.questions = test.questions.filter((item) => item.id !== question.id);
          if (Array.isArray(test.questionPool)) {
            test.questionPool = test.questionPool.filter((item) => item.id !== question.id);
          }
          const remainingTotal = (test.questionPool && test.questionPool.length) || test.questions.length;
          test.questionSelectionCount = remainingTotal ? clampQuestionSelectionCount(test.questions.length || remainingTotal, remainingTotal) : 0;
          state.selectedQuestionId = test.questions[0] ? test.questions[0].id : null;
          saveState();
          render();
        };
        bindQuestionEditor(question);
      }

      function bindQuestionEditor(question) {
        const saveAndRender = () => {
          saveState();
          render();
        };

        const bind = (id, handler, eventName = "input") => {
          const element = document.getElementById(id);
          if (element) element["on" + eventName] = handler;
        };

        bind("q-question", (event) => {
          question.question = event.target.value;
          saveAndRender();
        });
        bind("q-topic", (event) => {
          question.topic = event.target.value;
          saveAndRender();
        });
        bind("q-difficulty", (event) => {
          question.difficulty = event.target.value;
          saveAndRender();
        }, "change");
        bind("q-explanation", (event) => {
          question.explanation = event.target.value;
          saveAndRender();
        });
        bind("q-important", (event) => {
          question.important_terms = splitCsv(event.target.value);
          saveAndRender();
        });
        bind("q-published", (event) => {
          question.isPublished = event.target.checked;
          saveAndRender();
        }, "change");

        if (question.type === "multiple_choice") {
          bind("q-choices", (event) => {
            question.choices = splitLines(event.target.value);
            saveAndRender();
          });
          bind("q-answer", (event) => {
            question.answer = event.target.value;
            saveAndRender();
          });
        } else if (question.type === "fill_blank") {
          bind("q-answer", (event) => {
            question.answer = event.target.value;
            saveAndRender();
          });
          bind("q-acceptable", (event) => {
            question.acceptable_answers = splitLines(event.target.value);
            saveAndRender();
          });
        } else if (question.type === "written") {
          bind("q-model-answer", (event) => {
            question.model_answer = event.target.value;
            saveAndRender();
          });
          bind("q-keywords", (event) => {
            question.keywords = splitCsv(event.target.value);
            saveAndRender();
          });
          bind("q-total", (event) => {
            question.scoring.total = Number(event.target.value);
            saveAndRender();
          });
          bind("q-keyword-points", (event) => {
            question.scoring.keyword_points = Number(event.target.value);
            saveAndRender();
          });
          bind("q-context-points", (event) => {
            question.scoring.context_points = Number(event.target.value);
            saveAndRender();
          });
        } else if (question.type === "formula") {
          bind("q-answer-latex", (event) => {
            question.answer_latex = event.target.value;
            saveAndRender();
          });
          bind("q-acceptable-latex", (event) => {
            question.acceptable_latex = splitLines(event.target.value);
            saveAndRender();
          });
          bind("q-symbols", (event) => {
            question.symbols = splitCsv(event.target.value);
            saveAndRender();
          });
        }
      }

      function renderTaker() {

          return;

                    <h2 class="panel-title" style="margin-bottom:8px;">${escapeHtml(takerDisplayTitle(activeTest))}</h2>
                    <p class="help" style="margin-bottom:10px;">${escapeHtml(takerDisplaySubtitle(activeTest))}</p>
                    <div class="quick-metrics">
                      <span class="hero-pill">0問</span>

            state.activeTestId = null;
            render();
          };
          return;
        }

        root.innerHTML = `
          <div class="exam-list">
            <div class="panel">
              <div class="button-row" style="justify-content:space-between;">
                <div>
                  <h2 class="panel-title" style="margin-bottom:8px;">${escapeHtml(takerDisplayTitle(activeTest))}</h2>
                  <p class="help" style="margin-bottom:10px;">${escapeHtml(takerDisplaySubtitle(activeTest))}</p>
                  <div class="quick-metrics">
                    <span class="hero-pill">${visibleQuestions.length}問</span>
                    <span class="hero-pill teal">${escapeHtml(dominantTopicForTest(activeTest) || "受験中")}</span>
                    <span class="hero-pill orange">${state.result ? "採点済み" : "回答中"}</span>
                  </div>
                </div>
                <button id="back-to-tests" class="btn-soft" type="button">一覧へ戻る</button>
              </div>

            ${

                ? `<div class="score-card panel">
                    <div class="score-main">
                      <strong>${state.result.percentage}%</strong>
                      <span>合計 ${state.result.totalPoints} / ${state.result.maxPoints} 点</span>
                    </div>
                    <div class="mini-help">各問題の採点結果は下に表示されます。採点後は問題1から確認できます。</div>

            ${

                ? `<div class="score-card panel">
                    <div class="score-main">
                      <strong>${state.result.percentage}%</strong>
                      <span>合計 ${state.result.totalPoints} / ${state.result.maxPoints} 点</span>
                    </div>

      function renderQuestionCard(question, index) {
        const breakdown = state.result
          ? state.result.breakdowns.find((item) => item.questionId === question.id)
          : null;
        const display = splitQuestionDisplay(question);

        return `
          <article class="question-card type-${question.type}">
            <div class="q-head">
              <div class="button-row" style="justify-content:flex-start;">
                <div class="q-number">Q${index + 1}</div>
                <div class="question-tags">
                  <span class="tag type">${TYPE_LABELS[question.type]}</span>
                  ${question.answer_mode === "numeric" ? '<span class="tag level">数値入力</span>' : ""}
                  <span class="tag level">${LEVEL_LABELS[question.difficulty]}</span>
                  <span class="tag topic">${escapeHtml(question.topic)}</span>
                </div>
              </div>
            </div>
            <div class="question-heading">
              ${
                display.title
                  ? `<div class="question-kicker"><span class="question-kicker-label">問題タイトル</span><span>${escapeHtml(display.title)}</span></div>`
                  : ""
              }
              <div class="q-text">${escapeHtml(display.prompt || question.question)}</div>
            </div>
            ${renderAnswerInput(question)}
            ${
              breakdown
                ? `<div class="result-card ${breakdown.isCorrect ? "ok" : "ng"}">
                    <div class="result-title">${breakdown.earnedPoints} / ${breakdown.maxPoints} 点</div>
                    <div>${escapeHtml(breakdown.feedback)}</div>
                    <div>あなたの回答: ${escapeHtml(breakdown.userAnswer || "未入力")}</div>
                    <div>正解例: ${escapeHtml(breakdown.expectedAnswer)}</div>
                    <div>解説: ${escapeHtml(getDisplayQuestionExplanation(question))}</div>
                  </div>`
                : ""
            }
          </article>
        `;
      }

      function renderAnswerInput(question) {
        const value = state.responses[question.id] || "";

        if (question.type === "multiple_choice") {
          return `<div class="choices">${question.choices.map((choice) => `
            <label class="choice ${value === choice ? "active" : ""}">
              <input type="radio" name="${question.id}" value="${escapeHtml(choice)}" ${value === choice ? "checked" : ""} />
              <span>${escapeHtml(choice)}</span>
            </label>
          `).join("")}</div>`;
        }

        if (question.type === "fill_blank") {
          return `<input class="answer-input" data-answer-id="${question.id}" value="${escapeHtml(value)}" placeholder="${question.answer_mode === "numeric" ? "例: 10% または 0.83" : "答えを入力"}" />`;
        }

        if (question.type === "written") {
          return `<textarea class="answer-textarea" data-answer-id="${question.id}" rows="5" placeholder="短く説明してください">${escapeHtml(value)}</textarea>`;
        }

        const draft = ensureFormulaDraft(question);
        const palettes = formulaPaletteButtons();
        const targetHint = buildFormulaTargetHint(question);
        const modal =
          state.formulaModal && state.formulaModal.questionId === question.id
            ? renderFormulaModal(question.id, state.formulaModal.type)
            : "";

        return `
          <div class="formula-box formula-workflow">
            ${targetHint ? `<div class="mini-help" style="margin-bottom:10px;">${escapeHtml(targetHint)}</div>` : ""}
            <div class="formula-help-card">
              <strong>【操作方法】</strong><br />
              ① 左辺・右辺をクリックして選びます ② 英数字はキーボードで入力できます ③ ギリシャ文字はパレットから入れます<br />
              ④ <strong>分数</strong> は分子・分母を入れて確定 ⑤ <strong>指数</strong> は底と指数を入れて確定 ⑥ <strong>下付き</strong> は文字と下付き数字を入れて確定<br />
              ⑦ トークンが複雑なときは <strong>平方根</strong> を使います ⑧ <strong>← 削除</strong> で最後の文字を消します
            </div>
            <div class="formula-editor-shell">
              <div class="equation-row">
                <div class="formula-side-group">
                  <div class="formula-side-label">左辺</div>
                  <input
                    class="formula-side-input ${draft.activeSide === "lhs" ? "active" : ""}"
                    data-formula-side="lhs"
                    data-question-id="${question.id}"
                    value="${escapeHtml(draft.lhs)}"
                    placeholder="クリックして選択"
                  />
                </div>
                <div class="formula-equals">=</div>
                <div class="formula-side-group">
                  <div class="formula-side-label">右辺</div>
                  <input
                    class="formula-side-input ${draft.activeSide === "rhs" ? "active" : ""}"
                    data-formula-side="rhs"
                    data-question-id="${question.id}"
                    value="${escapeHtml(draft.rhs)}"
                    placeholder="クリックして選択"
                  />
                </div>
              </div>
              <div class="formula-preview-stage" data-formula-preview="${question.id}">${renderFormulaPreview(draft)}</div>
            </div>
            <div class="toolbar-group">
              <div class="palette-heading">ギリシャ文字</div>
              <div class="palette-grid" data-formula-target="${question.id}">${palettes.greek}</div>
            </div>
            <div class="toolbar-group">
              <div class="palette-heading">演算子・構造</div>
              <div class="palette-grid" data-formula-target="${question.id}">${palettes.ops}</div>
            </div>
            <div class="formula-actions">
              <button class="formula-btn-lite danger" type="button" data-formula-action="backspace" data-question-id="${question.id}">← 削除</button>
              <button class="formula-btn-lite" type="button" data-formula-action="clear" data-question-id="${question.id}">クリア</button>
            </div>
            ${modal}
          </div>
        `;
      }

      function renderFormulaModal(questionId, type) {
        const fields = formulaModalFields(type);
        return `
          <div class="formula-modal">
            <div class="formula-modal-card">
              <h3 class="formula-modal-title">${escapeHtml(formulaModalTitle(type))}</h3>
              <p class="formula-modal-hint">入力後に「追加する」を押すと、選択中の左辺または右辺に反映します。<br />分子・分母の中では <strong>m_1</strong> や <strong>x^2</strong> のように入力できます。</p>
              <div class="formula-mini-grid ${fields.length === 1 ? "single" : ""}">
                ${fields
                  .map(
                    (field) => `
                      <label class="formula-mini-field">
                        <span class="label">${escapeHtml(field.label)}</span>
                        <input data-modal-field="${escapeHtml(field.key)}" data-question-id="${questionId}" placeholder="${escapeHtml(field.placeholder)}" />
                      </label>
                    `
                  )
                  .join("")}
              </div>
              <div class="formula-modal-actions">
                <button class="formula-btn-lite" type="button" data-formula-action="cancel-modal" data-question-id="${questionId}">キャンセル</button>
                <button class="btn" type="button" data-formula-action="confirm-modal" data-question-id="${questionId}" data-modal-type="${type}">追加する</button>
              </div>
            </div>
          </div>
        `;
      }

      function bindExamInputs() {
        document.querySelectorAll('input[type="radio"]').forEach((element) => {
          element.onchange = () => {
            state.responses[element.name] = element.value;
            render();
          };
        });

        document.querySelectorAll("[data-answer-id]").forEach((element) => {
          element.oninput = (event) => {
            const questionId = event.target.dataset.answerId;
            state.responses[questionId] = event.target.value;
          };
        });

        document.querySelectorAll("[data-formula-side]").forEach((element) => {
          element.onfocus = () => {
            const questionId = element.dataset.questionId;
            const draft = state.formulaDrafts[questionId];
            if (!draft) return;
            draft.activeSide = element.dataset.formulaSide;
          };
          element.oninput = () => {
            const questionId = element.dataset.questionId;
            const draft = state.formulaDrafts[questionId];
            if (!draft) return;
            draft[element.dataset.formulaSide] = normalizeFormulaSnippet(element.value);
            draft.activeSide = element.dataset.formulaSide;
            syncFormulaResponse(questionId);
            refreshFormulaPreview(questionId);
          };
        });

        document.querySelectorAll("[data-formula-insert]").forEach((button) => {
          button.onclick = () => {
            const questionId = button.closest("[data-formula-target]").dataset.formulaTarget;
            const draft = state.formulaDrafts[questionId];
            if (!draft) return;

            if (button.dataset.formulaStructure === "1") {
              state.formulaModal = { questionId, type: button.dataset.formulaInsert };
              render();
              return;
            }

            const side = draft.activeSide || "rhs";
            draft[side] = normalizeFormulaSnippet((draft[side] || "") + button.dataset.formulaInsert);
            syncFormulaResponse(questionId);
            render();
          };
        });

        document.querySelectorAll("[data-formula-action]").forEach((button) => {
          button.onclick = () => {
            const questionId = button.dataset.questionId;
            const action = button.dataset.formulaAction;
            const draft = state.formulaDrafts[questionId];

            if (action === "cancel-modal") {
              state.formulaModal = null;
              render();
              return;
            }

            if (action === "confirm-modal") {
              const modalType = button.dataset.modalType;
              const fields = Object.fromEntries(
                formulaModalFields(modalType).map((field) => {
                  const input = document.querySelector(`[data-modal-field="${field.key}"][data-question-id="${questionId}"]`);
                  return [field.key, normalizeFormulaSnippet(input ? input.value.trim() : "")];
                })
              );
              const side = draft && draft.activeSide ? draft.activeSide : "rhs";
              let snippet = "";
              if (modalType === "frac" && fields.numerator && fields.denominator) {
                snippet = `\\frac{${fields.numerator}}{${fields.denominator}}`;
              } else if (modalType === "sup" && fields.base && fields.exponent) {
                snippet = `${fields.base}^{${fields.exponent}}`;
              } else if (modalType === "sub" && fields.base && fields.subscript) {
                snippet = `${fields.base}_{${fields.subscript}}`;
              } else if (modalType === "sqrt" && fields.radicand) {
                snippet = `\\sqrt{${fields.radicand}}`;
              }
              if (draft && snippet) {
                draft[side] = normalizeFormulaSnippet((draft[side] || "") + snippet);
                syncFormulaResponse(questionId);
              }
              state.formulaModal = null;
              render();
              return;
            }

            if (!draft) return;
            const side = draft.activeSide || "rhs";
            if (action === "backspace") {
              draft[side] = trimLastFormulaUnit(draft[side] || "");
            }
            if (action === "clear") {
              draft[side] = "";
            }
            syncFormulaResponse(questionId);
            render();
          };
        });

        document.onkeydown = (event) => {
          if (state.view !== "taker" || state.result || state.formulaModal) return;
          const focused = document.activeElement;
          if (focused && (focused.tagName === "TEXTAREA" || focused.tagName === "INPUT")) {
            return;
          }

          const activeEntry = Object.entries(state.formulaDrafts).find(([, draft]) => draft && draft.activeSide);
          if (!activeEntry) return;
          const [questionId, draft] = activeEntry;
          const side = draft.activeSide || "rhs";

          if (event.key === "Backspace") {
            draft[side] = trimLastFormulaUnit(draft[side] || "");
            syncFormulaResponse(questionId);
            render();
            event.preventDefault();
            return;
          }

          if (/^[A-Za-z0-9.+\-()]$/.test(event.key)) {
            draft[side] = (draft[side] || "") + event.key;
            syncFormulaResponse(questionId);
            render();
            event.preventDefault();
          }
        };
      }

      function renderFormula(value) {
        const text = String(value || "").trim();
        if (!text) {
          return '<span class="formula-fallback">' + escapeHtml("ここに数式プレビューが表示されます") + "</span>";
        }
        return `<span class="formula-preview-equation">${renderInlineFormulaHtml(text)}</span>`;
      }

      function cleanFormulaAnswerText(value) {
        return String(value || "")
          .replace(/\s+[（(][^()（）]*(?:[:：]|向き|関係|合計|逆数|定義|解く|単位|または|大きい|小さい|比例|内部降下|pu)[^()（）]*[）)]/g, "")
          .replace(/\s*[［\[][^［\]]*(?:rpm|hz|kw|mw|va|a|v|w|%|pu)[^［\]]*[］\]]/gi, "")
          .replace(/\s*[→⇔].*$/g, "")
          .trim();
      }

      function extractPrimaryFormulaAnswer(answerText) {
        let text = cleanFormulaAnswerText(String(answerText || "").trim());
        text = text
          .replace(/（[^）]*(?:でも可|例：)[^）]*）/g, "")
          .replace(/\([^)]*(?:でも可|例:|例：)[^)]*\)/g, "")
          .trim();
        return text;
      }

      function buildFormulaAcceptableLatex(formulaText) {
        const primary = extractPrimaryFormulaAnswer(formulaText);
        const variants = new Set();
        if (!primary) return [];

        variants.add(primary);
        variants.add(primary.replace(/\s+/g, ""));

        const equation = splitEquation(primary);
        if (equation.lhs && equation.rhs) {
          const lhs = equation.lhs.trim();
          const rhs = equation.rhs.trim();
          variants.add(`${lhs} = ${rhs}`);
          variants.add(`${lhs}=${rhs}`);
          variants.add(`${rhs}`);

          const fracMatch = rhs.match(/^\\frac\s*\{([^{}]+)\}\s*\{([^{}]+)\}$/);
          if (fracMatch) {
            variants.add(`${lhs} = ${fracMatch[1]} / ${fracMatch[2]}`);
            variants.add(`${lhs}=${fracMatch[1]}/${fracMatch[2]}`);
            variants.add(`\\frac{${fracMatch[1]}}{${fracMatch[2]}}`);
            variants.add(`${fracMatch[1]}/${fracMatch[2]}`);
          }

          const slashMatch = rhs.match(/^\(?\s*([^=()]+?)\s*\)?\/\(?\s*([^=()]+?)\s*\)?$/);
          if (slashMatch) {
            variants.add(`${lhs} = \\frac{${slashMatch[1].trim()}}{${slashMatch[2].trim()}}`);
            variants.add(`${lhs}=\\frac{${slashMatch[1].trim()}}{${slashMatch[2].trim()}}`);
          }
        }

        return Array.from(variants).filter(Boolean);
      }

      function normalizeFormulaForScoring(value) {
        const prepared = cleanFormulaAnswerText(String(value || ""))
          .normalize("NFKC")
          .replace(/Δ|△/g, "delta")
          .replace(/Φ|φ|ϕ/g, "phi")
          .replace(/ε/g, "epsilon")
          .replace(/Ω/g, "omega")
          .replace(/√3/g, "sqrt(3)")
          .replace(/×/g, "*")
          .replace(/÷/g, "/")
          .replace(/−/g, "-")
          .replace(/∝/g, "=")
          .replace(/₀/g, "0")
          .replace(/₁/g, "1")
          .replace(/₂/g, "2")
          .replace(/ₙ/g, "n")
          .replace(/_?\{?\s*pu\s*\}?/gi, "pu")
          .replace(/([A-Za-z]+)\s*_\s*\{\s*([A-Za-z0-9+\-]+)\s*\}/g, "$1$2")
          .replace(/([A-Za-z]+)\s*\{\s*([A-Za-z0-9+\-]+)\s*\}/g, "$1$2")
          .replace(/([A-Za-z]+)\s+([A-Za-z0-9])/g, "$1$2")
          .replace(/_/g, "");
        return normalizeLatex(prepared);
      }

      function buildQuestionSpecificFormulaVariants(question) {
        const questionText = String(question && question.question ? question.question : "");
        const variants = new Set();

        if (/短絡比/.test(questionText) && /同期インピーダンス/.test(questionText)) {
          [
            "Ks = 1 / Zs",
            "Ks = 1 / Zpu",
            "Ks = \\frac{1}{Zs}",
            "Ks = \\frac{1}{Zpu}",
            "Zs = 1 / Ks",
            "Zpu = 1 / Ks"
          ].forEach((value) => variants.add(value));
        }

        if (/誘導起電力 E/.test(questionText) && /磁束/.test(questionText) && /回転速度 n/.test(questionText)) {
          [
            "E = k * phi * n",
            "E = kphi n",
            "E = kphin",
            "E = k * n * phi",
            "E = k n phi",
            "E = phi * n",
            "E = n * phi",
            "E = phi n",
            "E = n phi",
            "E = kΦn",
            "E = kφn",
            "E = Φn",
            "E = φn",
            "E = nφ"
          ].forEach((value) => variants.add(value));
        }

        if (/端子電圧 V/.test(questionText) && /E0/.test(questionText) && /ΔV/.test(questionText)) {
          [
            "V = E0 - deltaV",
            "V = E0 - ΔV",
            "E0 = V + deltaV",
            "E0 = V + ΔV"
          ].forEach((value) => variants.add(value));
        }

        return Array.from(variants);
      }

      function buildFormulaAccepts(question) {
        const primary = extractPrimaryFormulaAnswer(question.answer_latex || "");
        const variants = new Set(
          [primary]
            .concat(Array.isArray(question.acceptable_latex) ? question.acceptable_latex : [])
            .concat(buildQuestionSpecificFormulaVariants(question))
            .flatMap((value) => buildFormulaAcceptableLatex(value))
            .filter(Boolean)
        );

        const equation = splitEquation(primary);
        if (equation.rhs) {
          variants.add(equation.rhs);
          variants.add(equation.rhs.replace(/\s+/g, ""));
        }

        return Array.from(variants).filter(Boolean);
      }

      function formulaTokenBag(value) {
        return preprocessFormulaExpression(value)
          .toLowerCase()
          .replace(/delta/g, "delta")
          .replace(/phi/g, "phi")
          .match(/[a-z]+|\d+(?:\.\d+)?|[+\-*/=]/g) || [];
      }

      function formulaSimilarity(expected, userAnswer) {
        const a = formulaTokenBag(expected);
        const b = formulaTokenBag(userAnswer);
        if (!a.length || !b.length) return 0;
        const remaining = b.slice();
        let matches = 0;
        a.forEach((token) => {
          const idx = remaining.indexOf(token);
          if (idx >= 0) {
            matches += 1;
            remaining.splice(idx, 1);
          }
        });
        return matches / Math.max(a.length, b.length);
      }

      function extractWrittenConcepts(question) {
        const raw = []
          .concat(Array.isArray(question.keywords) ? question.keywords : [])
          .concat(Array.isArray(question.important_terms) ? question.important_terms : [])
          .concat(String(question.model_answer || ""))
          .join(" / ");
        const units = new Set();
        (raw.match(/[一-龥ぁ-んァ-ンA-Za-z0-9ΔΦφεΩ]{2,}/g) || []).forEach((token) => {
          if (!/^(または|こと|ため|よう|です|ます|する|した|して)$/.test(token)) {
            units.add(token);
          }
        });
        if (/電圧/.test(question.question)) units.add("電圧");
        if (/電流/.test(question.question)) units.add("電流");
        if (/直流/.test(raw + question.question)) units.add("直流");
        return Array.from(units);
      }

      function matchWrittenConcepts(question, userAnswer) {
        const normalized = normalizeText(userAnswer);
        const concepts = extractWrittenConcepts(question);
        const matched = concepts.filter((concept) => normalized.includes(normalizeText(concept)));

        if (/電圧/.test(question.question) && /電流/.test(question.question) && /種類/.test(question.question)) {
          if (/(どちらも直流|両方直流|電圧も電流も直流)/.test(normalized)) {
            ["直流", "電圧", "電流"].forEach((concept) => {
              if (!matched.includes(concept)) matched.push(concept);
            });
          }
        }

        return { concepts, matched };
      }

      function buildWrittenFeedback(question, userAnswer, matched) {
        if (!String(userAnswer || "").trim()) {
          return "未入力です。まずは結論を短く書き、その後に理由や補足を1文だけ足すと点につながりやすくなります。";
        }
        const { concepts } = matchWrittenConcepts(question, userAnswer);
        const missing = concepts.filter((concept) => !matched.includes(concept));
        if (matched.length && missing.length) {
          return `「${matched.slice(0, 2).join("」「")}」は書けています。次は「${missing.slice(0, 2).join("」「")}」も入れると、答えの意図がよりはっきり伝わります。`;
        }
        if (matched.length) {
          return "大事な用語は押さえられています。結論を先に書き、その後に理由を1文添えるとさらに伝わりやすくなります。";
        }
        if (concepts.length) {
          return `重要語句の「${concepts.slice(0, 2).join("」「")}」を入れて、結論から先に書くと採点されやすくなります。`;
        }
        return "結論を先に書き、その後に理由や仕組みを1文だけ足すと、より分かりやすい答案になります。";
      }

      function scoreQuestion(question, userAnswer, test) {
        if (question.type === "multiple_choice") {
          const isCorrect = normalizeText(userAnswer) === normalizeText(question.answer);
          return {
            questionId: question.id,
            earnedPoints: isCorrect ? questionMaxPoints(question, test) : 0,
            maxPoints: questionMaxPoints(question, test),
            isCorrect,
            feedback: isCorrect ? "正解です。" : "不正解です。",
            expectedAnswer: question.answer,
            userAnswer
          };
        }

        if (question.type === "fill_blank") {
          const accepts = [question.answer].concat(question.acceptable_answers || []).map(normalizeText);
          const isCorrect = accepts.includes(normalizeText(userAnswer));
          return {
            questionId: question.id,
            earnedPoints: isCorrect ? questionMaxPoints(question, test) : 0,
            maxPoints: questionMaxPoints(question, test),
            isCorrect,
            feedback: isCorrect ? "正解です。" : "不正解です。",
            expectedAnswer: question.answer,
            userAnswer
          };
        }

        if (question.type === "formula") {
          const accepts = buildFormulaAccepts(question);
          const normalizedUserAnswer = normalizeFormulaForScoring(userAnswer);
          const exact = accepts.some((expected) =>
            areFormulasEquivalent(expected, userAnswer) ||
            normalizeFormulaForScoring(expected) === normalizedUserAnswer
          );
          const maxPoints = questionMaxPoints(question, test);
          if (exact) {
            return {
              questionId: question.id,
              earnedPoints: maxPoints,
              maxPoints,
              isCorrect: true,
              feedback: "正しい式として判定しました。",
              expectedAnswer: extractPrimaryFormulaAnswer(question.answer_latex),
              userAnswer
            };
          }

          const bestSimilarity = accepts.reduce((best, expected) => Math.max(best, formulaSimilarity(expected, userAnswer)), 0);
          const earnedPoints = bestSimilarity >= 0.85
            ? Math.max(1, Math.round(maxPoints * 0.8))
            : bestSimilarity >= 0.65
              ? Math.max(1, Math.round(maxPoints * 0.5))
              : bestSimilarity >= 0.45
                ? Math.max(1, Math.round(maxPoints * 0.3))
                : 0;

          return {
            questionId: question.id,
            earnedPoints,
            maxPoints,
            isCorrect: earnedPoints >= Math.ceil(maxPoints * 0.8),
            feedback: earnedPoints
              ? "式の向きや使う記号は概ね合っています。あと少し表記を整えると満点に近づきます。"
              : "不正解です。",
            expectedAnswer: extractPrimaryFormulaAnswer(question.answer_latex),
            userAnswer
          };
        }

        const { concepts, matched } = matchWrittenConcepts(question, userAnswer);
        const keywordRatio = concepts.length ? matched.length / concepts.length : 0;
        const keywordPoints = Math.round((question.scoring?.keyword_points || 0) * keywordRatio);
        const conciseBonus =
          /電圧/.test(question.question) && /電流/.test(question.question) && /(どちらも直流|両方直流|電圧も電流も直流)/.test(normalizeText(userAnswer))
            ? Math.round((question.scoring?.context_points || 0) * 0.8)
            : 0;
        const contextRatio = userAnswer.trim().length >= 25 ? 0.6 : userAnswer.trim() ? 0.3 : 0;
        const contextPoints = Math.round(
          Math.max(conciseBonus, (question.scoring?.context_points || 0) * Math.min(1, keywordRatio + contextRatio))
        );
        const maxPoints = questionMaxPoints(question, test);
        const earned = Math.min(maxPoints, keywordPoints + contextPoints);
        return {
          questionId: question.id,
          earnedPoints: earned,
          maxPoints,
          isCorrect: earned >= Math.ceil(maxPoints * 0.6),
          feedback: buildWrittenFeedback(question, userAnswer, matched),
          expectedAnswer: question.model_answer,
          userAnswer
        };
      }

      document.getElementById("view-admin").onclick = () => setView("admin");
      document.getElementById("view-taker").onclick = () => setView("taker");

      render();
    </script>
  </body>
</html>
