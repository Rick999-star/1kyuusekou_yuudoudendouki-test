      function normalizeText(value) {
        return String(value || "").normalize("NFKC").trim().toLowerCase().replace(/\s+/g, "");
      }

      function normalizeLatex(value) {
        let text = String(value || "")
          .normalize("NFKC")
          .replace(/\\left|\\right/g, "")
          .replace(/\\times/g, "*")
          .replace(/\\cdot/g, "*")
          .replace(/×/g, "*")
          .replace(/\\div/g, "/")
          .replace(/÷/g, "/")
          .replace(/\\,/g, "")
          .replace(/\\!/g, "");

        while (/\\frac\s*\{[^{}]+\}\s*\{[^{}]+\}/.test(text)) {
          text = text.replace(/\\frac\s*\{([^{}]+)\}\s*\{([^{}]+)\}/g, "($1)/($2)");
        }

        return text
          .replace(/\\sqrt\s*\{([^{}]+)\}/g, "sqrt($1)")
          .replace(/[{}]/g, "")
          .replace(/[()]/g, "")
          .replace(/\s+/g, "")
          .trim()
          .toLowerCase();
      }

      function extractPrimaryFormulaAnswer(answerText) {
        let text = String(answerText || "").trim();
        text = text
          .replace(/（[^）]*でも可[^）]*）/g, "")
          .replace(/\([^)]*でも可[^)]*\)/g, "")
          .replace(/（[^）]*可）/g, "")
          .replace(/\([^)]*可\)/g, "")
          .trim();
        return text;
      }

      function buildFormulaAcceptableLatex(formulaText) {
        const variants = new Set();
        const primary = String(formulaText || "").trim();
        if (!primary) return [];

        variants.add(primary);
        variants.add(primary.replace(/\s+/g, ""));

        const eqMatch = primary.match(/^(.*?)=(.*)$/);
        if (eqMatch) {
          const lhs = eqMatch[1].trim();
          const rhs = eqMatch[2].trim();
          const fracMatch = rhs.match(/^\\frac\s*\{([^{}]+)\}\s*\{([^{}]+)\}$/);
          if (fracMatch) {
            variants.add(`${lhs} = ${fracMatch[1]} / ${fracMatch[2]}`);
            variants.add(`${lhs}=${fracMatch[1]}/${fracMatch[2]}`);
          }
          const slashMatch = rhs.match(/^([^=]+)\/([^=]+)$/);
          if (slashMatch) {
            variants.add(`${lhs} = \\frac{${slashMatch[1].trim()}}{${slashMatch[2].trim()}}`);
            variants.add(`${lhs}=\\frac{${slashMatch[1].trim()}}{${slashMatch[2].trim()}}`);
          }
        }

        return Array.from(variants).filter(Boolean);
      }

      function normalizeFormulaForScoring(value) {
        return normalizeLatex(
          String(value || "")
            .replace(/[（(]\s*(?:例|注|備考|でも可)[^）)]*[）)]/g, "")
            .replace(/\[[^\]]*(?:rpm|hz|kw|mw|va|a|v|w|%|pu|unit|単位)[^\]]*\]/gi, "")
            .replace(/(?:例|注|備考)\s*[:：].*$/g, "")
            .replace(/_/g, "")
        );
      }

      function splitEquation(text) {
        const match = String(text || "").match(/^(.*?)=(.*)$/);
        return match ? { lhs: match[1].trim(), rhs: match[2].trim() } : { lhs: "", rhs: String(text || "").trim() };
      }

      function buildFormulaAccepts(question) {
        const primary = extractPrimaryFormulaAnswer(question.answer_latex || "");
        const variants = new Set(
          [primary]
            .concat(Array.isArray(question.acceptable_latex) ? question.acceptable_latex : [])
            .flatMap((value) => buildFormulaAcceptableLatex(value))
            .filter(Boolean)
        );

        const equation = splitEquation(primary);
        if (equation.rhs) {
          variants.add(equation.rhs);
          variants.add(equation.rhs.replace(/\s+/g, ""));
        }

        const normalizedPrimary = normalizeFormulaForScoring(primary);
        const questionText = String(question.question || "");
        if (
          (/ns=/.test(normalizedPrimary) || /同期速度|同期回転速度|回転速度/.test(questionText)) &&
          /f/.test(normalizedPrimary) &&
          /\/p/.test(normalizedPrimary)
        ) {
          const lhs = equation.lhs || "Ns";
          [
            `${lhs} = \\frac{120f}{p}`,
            `${lhs}=\\frac{120f}{p}`,
            `${lhs} = 120f / p`,
            `${lhs}=120f/p`,
            `${lhs} = \\frac{60f}{p}`,
            `${lhs}=\\frac{60f}{p}`,
            `${lhs} = 60f / p`,
            `${lhs}=60f/p`,
            `\\frac{120f}{p}`,
            `120f/p`,
            `\\frac{60f}{p}`,
            `60f/p`
          ].forEach((value) => variants.add(value));
        }

        return Array.from(variants).map(normalizeFormulaForScoring).filter(Boolean);
      }

      function normalizeFormulaForScoring(value) {
        return normalizeLatex(
          String(value || "")
            .replace(/[（(]\s*(?:例|注|備考|でも可)[^）)]*[）)]/g, "")
            .replace(/\[[^\]]*(?:rpm|hz|kw|mw|va|a|v|w|%|pu|unit|単位)[^\]]*\]/gi, "")
            .replace(/(?:例|注|備考)\s*[:：].*$/g, "")
            .replace(/([A-Za-zΔδΑ-Ωα-ω]+)\s*_\s*\{\s*([A-Za-z0-9ΔδΑ-Ωα-ω+\-]+)\s*\}/g, "$1$2")
            .replace(/([A-Za-zΔδΑ-Ωα-ω]+)\s*\{\s*([A-Za-z0-9ΔδΑ-Ωα-ω+\-]+)\s*\}/g, (all, head, tail) =>
              /^(frac|sqrt|text|mathrm)$/i.test(head) ? all : `${head}${tail}`
            )
            .replace(/_/g, "")
        );
      }

      function preprocessFormulaExpression(value) {
        let text = String(value || "").normalize("NFKC");
        text = text
          .replace(/\\left|\\right/g, "")
          .replace(/\\times|\\cdot/g, "*")
          .replace(/\\div/g, "/")
          .replace(/×/g, "*")
          .replace(/÷/g, "/")
          .replace(/([A-Za-zΔδΑ-Ωα-ω]+)\s*_\s*\{\s*([A-Za-z0-9ΔδΑ-Ωα-ω+\-]+)\s*\}/g, "$1$2")
          .replace(/([A-Za-zΔδΑ-Ωα-ω]+)\s*\{\s*([A-Za-z0-9ΔδΑ-Ωα-ω+\-]+)\s*\}/g, (all, head, tail) =>
            /^(frac|sqrt|text|mathrm)$/i.test(head) ? all : `${head}${tail}`
          );
        while (/\\frac\s*\{[^{}]+\}\s*\{[^{}]+\}/.test(text)) {
          text = text.replace(/\\frac\s*\{([^{}]+)\}\s*\{([^{}]+)\}/g, "($1)/($2)");
        }
        return text.replace(/[{}]/g, "");
      }

      function tokenizeFormulaExpression(value) {
        const text = preprocessFormulaExpression(value);
        const tokens = [];
        let index = 0;
        while (index < text.length) {
          const char = text[index];
          if (/\s/.test(char)) {
            index += 1;
            continue;
          }
          if ("()+-*/=".includes(char)) {
            tokens.push({ type: char, value: char });
            index += 1;
            continue;
          }
          const numberMatch = text.slice(index).match(/^\d+(?:\.\d+)?/);
          if (numberMatch) {
            tokens.push({ type: "number", value: numberMatch[0] });
            index += numberMatch[0].length;
            continue;
          }
          const identifierMatch = text.slice(index).match(/^[A-Za-zΔδΑ-Ωα-ω][A-Za-z0-9ΔδΑ-Ωα-ω]*/);
          if (identifierMatch) {
            const rawIdentifier = identifierMatch[0];
            if (/^[A-ZΔΩΘΛΜΡΣΠΦΓ]{2,}$/.test(rawIdentifier)) {
              rawIdentifier.split("").forEach((part) => {
                tokens.push({ type: "identifier", value: part.toLowerCase() });
              });
            } else {
              tokens.push({ type: "identifier", value: rawIdentifier.toLowerCase() });
            }
            index += identifierMatch[0].length;
            continue;
          }
          index += 1;
        }

        const expanded = [];
        for (let i = 0; i < tokens.length; i += 1) {
          const current = tokens[i];
          const previous = expanded[expanded.length - 1];
          if (
            previous &&
            (previous.type === "number" || previous.type === "identifier" || previous.type === ")") &&
            (current.type === "number" || current.type === "identifier" || current.type === "(")
          ) {
            expanded.push({ type: "*", value: "*" });
          }
          expanded.push(current);
        }
        return expanded;
      }

      function canonicalizeFormulaExpression(value) {
        const tokens = tokenizeFormulaExpression(value);
        let index = 0;

        function peek() {
          return tokens[index];
        }

        function consume(type) {
          const token = tokens[index];
          if (!token || (type && token.type !== type)) return null;
          index += 1;
          return token;
        }

        function canonicalNode(node) {
          if (!node) return "";
          if (node.kind === "number" || node.kind === "identifier") return node.value;
          if (node.kind === "neg") return `neg(${canonicalNode(node.value)})`;
          if (node.kind === "call") return `${node.name}(${canonicalNode(node.arg)})`;
          if (node.kind === "mul" || node.kind === "add") {
            return `${node.kind}(${node.items.map(canonicalNode).sort().join(",")})`;
          }
          if (node.kind === "div") return `div(${canonicalNode(node.left)},${canonicalNode(node.right)})`;
          if (node.kind === "sub") return `sub(${canonicalNode(node.left)},${canonicalNode(node.right)})`;
          return "";
        }

        function parsePrimary() {
          const token = peek();
          if (!token) return { kind: "identifier", value: "" };
          if (consume("(")) {
            const expr = parseExpression();
            consume(")");
            return expr;
          }
          if (token.type === "-") {
            consume("-");
            return { kind: "neg", value: parsePrimary() };
          }
          if (token.type === "identifier") {
            consume("identifier");
            if (token.value === "sqrt" && consume("(")) {
              const inner = parseExpression();
              consume(")");
              return { kind: "call", name: "sqrt", arg: inner };
            }
            return { kind: "identifier", value: token.value };
          }
          if (token.type === "number") {
            consume("number");
            return { kind: "number", value: token.value };
          }
          consume(token.type);
          return { kind: "identifier", value: token.value || "" };
        }

        function parseMulDiv() {
          let node = parsePrimary();
          while (peek() && (peek().type === "*" || peek().type === "/")) {
            const operator = consume(peek().type).type;
            const right = parsePrimary();
            if (operator === "*") {
              const items = [];
              if (node.kind === "mul") items.push(...node.items);
              else items.push(node);
              if (right.kind === "mul") items.push(...right.items);
              else items.push(right);
              node = { kind: "mul", items };
            } else {
              node = { kind: "div", left: node, right };
            }
          }
          return node;
        }

        function parseExpression() {
          let node = parseMulDiv();
          while (peek() && (peek().type === "+" || peek().type === "-")) {
            const operator = consume(peek().type).type;
            const right = parseMulDiv();
            if (operator === "+") {
              const items = [];
              if (node.kind === "add") items.push(...node.items);
              else items.push(node);
              if (right.kind === "add") items.push(...right.items);
              else items.push(right);
              node = { kind: "add", items };
            } else {
              node = { kind: "sub", left: node, right };
            }
          }
          return node;
        }

        return canonicalNode(parseExpression());
      }

      function canonicalizeFormulaEquation(value) {
        const equation = splitEquation(value);
        const lhs = canonicalizeFormulaExpression(equation.lhs);
        const rhs = canonicalizeFormulaExpression(equation.rhs);
        if (!lhs) return { full: rhs, lhs, rhs };
        const direct = `${lhs}=${rhs}`;
        const swapped = `${rhs}=${lhs}`;
        return { full: direct < swapped ? direct : swapped, lhs, rhs };
      }

      function areFormulasEquivalent(expected, userAnswer) {
        const expectedEq = canonicalizeFormulaEquation(expected);
        const userEq = canonicalizeFormulaEquation(userAnswer);
        if (expectedEq.full && expectedEq.full === userEq.full) return true;
        if (expectedEq.rhs && expectedEq.rhs === userEq.rhs) return true;
        if (expectedEq.rhs && expectedEq.rhs === userEq.full) return true;
        return false;
      }

      function buildFormulaAccepts(question) {
        const primary = extractPrimaryFormulaAnswer(question.answer_latex || "");
        const variants = new Set(
          [primary]
            .concat(Array.isArray(question.acceptable_latex) ? question.acceptable_latex : [])
            .flatMap((value) => buildFormulaAcceptableLatex(value))
            .filter(Boolean)
        );

        const equation = splitEquation(primary);
        if (equation.rhs) {
          variants.add(equation.rhs);
          variants.add(equation.rhs.replace(/\s+/g, ""));
        }

        const normalizedPrimary = normalizeFormulaForScoring(primary);
        const questionText = String(question.question || "");
        if (
          (/ns=/.test(normalizedPrimary) || /同期速度|同期回転速度|回転速度/.test(questionText)) &&
          /f/.test(normalizedPrimary) &&
          /\/p/.test(normalizedPrimary)
        ) {
          const lhs = equation.lhs || "Ns";
          [
            `${lhs} = \\frac{120f}{p}`,
            `${lhs}=\\frac{120f}{p}`,
            `${lhs} = 120f / p`,
            `${lhs}=120f/p`,
            `${lhs} = \\frac{60f}{p}`,
            `${lhs}=\\frac{60f}{p}`,
            `${lhs} = 60f / p`,
            `${lhs}=60f/p`,
            `\\frac{120f}{p}`,
            `120f/p`,
            `\\frac{60f}{p}`,
            `60f/p`
          ].forEach((value) => variants.add(value));
        }

        return Array.from(variants).filter(Boolean);
      }

      function splitCsv(value) {
        return String(value || "")
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function repairQuestionTitle(question) {
        const title = String(question && question.title ? question.title : "").trim();
        if (!title) return title;
        return title
          .replace(/誘導発電して生じる電圧/g, "誘導起電力")
          .replace(/発電して生じる電圧/g, "発生する電圧");
      }

      function repairQuestionText(question) {
        const raw = String(question && question.question ? question.question : "").trim();
        if (!raw) return raw;

        let text = raw
          .replace(/必要です。?/g, "必要があります。")
          .replace(/誘導発電して生じる電圧/g, "誘導起電力")
          .replace(/発電して生じる電圧/g, "発生する電圧")
          .replace(/界磁巻線（磁界を作るコイル）には(.+?)を供給する必要があります。/g, "界磁巻線（磁界を作るコイル）には$1を供給する必要があります。");

        if (/直流発電機/.test(text) && /誘導起電力 E/.test(text) && /磁束/.test(text) && /回転速度 n/.test(text)) {
          text = "直流発電機で生じる誘導起電力 E が、磁束 Φ と回転速度 n に対してどのような関係にあるか書いてください。";
        }

        if (/同期発電機の端子電圧 V/.test(text) && /E0/.test(text) && /ΔV/.test(text)) {
          text = "同期発電機の端子電圧 V、誘導起電力 E0、内部降下 ΔV の関係式を書いてください。";
        }

        if (/励磁装置/.test(text) && /供給する電圧・電流の種類/.test(text)) {
          text = "同期発電機の励磁装置が、界磁巻線（磁界を作るコイル）へ供給する電圧と電流の種類を書いてください。";
        }

        return text;
      }

      function splitLines(value) {
        return String(value || "")
          .split(/\r?\n/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function summarizeText(value, maxLength = 160) {
        const normalized = String(value || "").replace(/\s+/g, " ").trim();
        return normalized.length <= maxLength ? normalized : normalized.slice(0, maxLength) + "...";
      }

      function questionMaxPoints(question, test) {
        if (test && test.scoringConfig && typeof test.scoringConfig[question.type] === "number") {
          return Number(test.scoringConfig[question.type]);
        }
        return question.type === "written" ? question.scoring.total : question.type === "formula" ? 10 : 5;
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function selectedTest() {
        return state.tests.find((test) => test.id === state.selectedTestId) || state.tests[0] || null;
      }

      function selectedQuestion() {
        const test = selectedTest();
        if (!test) return null;
        return test.questions.find((question) => question.id === state.selectedQuestionId) || test.questions[0] || null;
      }

      function updateMetrics() {
        document.getElementById("metric-tests").textContent = String(state.tests.length);
        document.getElementById("metric-published").textContent = String(
          state.tests.filter((test) => test.published).length
        );
        document.getElementById("metric-questions").textContent = String(
          state.tests.reduce((sum, test) => sum + test.questions.length, 0)
        );
      }

      function setView(nextView) {
        if (isPublicBuild && nextView === "admin") {
          nextView = "taker";
        }
        state.view = nextView;
        const adminButton = document.getElementById("view-admin");
        const takerButton = document.getElementById("view-taker");
        adminButton.classList.toggle("active", nextView === "admin");
        takerButton.classList.toggle("active", nextView === "taker");
        if (isPublicBuild) {
          adminButton.style.display = "none";
        }
        render();
      }

      function extractTerms(referenceText) {
        const stopWords = new Set(["です", "ます", "こと", "ため", "よう", "する", "した", "いる", "ある"]);
        return Array.from(
          new Set(
            String(referenceText)
              .split(/[\s、。,.()\[\]{}「」『』:;!?！？]+/)
              .map((token) => token.trim())
              .filter((token) => token.length >= 2 && !stopWords.has(token))
          )
        ).slice(0, 8);
      }

      function detectTopic(referenceText, terms) {
        if (/誘導電動機|三相誘導電動機|かご形|巻線形|すべり|同期速度|始動電流/.test(referenceText)) return "誘導電動機";
        if (/回転機|直流発電機|同期発電機|誘導発電機|励磁|短絡比|電機子/.test(referenceText)) return "回転機";
        if (/電流|電圧|抵抗|オーム/.test(referenceText)) return "電気回路";
        if (/速度|加速度|質量|運動/.test(referenceText)) return "力学";
        if (/化学|分子|原子|反応/.test(referenceText)) return "化学基礎";
        return terms[0] || "基礎学習";
      }

      function extractFormula(referenceText) {
        const match = String(referenceText).match(/[A-Za-z]+\s*=\s*[A-Za-z0-9+\-*/ ]+/);
        return match ? match[0].replace(/\s+/g, " ").trim() : null;
      }

      function applyDifficultyPreset(questions) {
        const preset = state.settings.defaultDifficultyPreset;
        return questions.map((question, index) => {
          if (preset === "easy") {
            return { ...question, difficulty: "basic" };
          }
          if (preset === "hard") {
            return {
              ...question,
              difficulty:
                question.type === "written" || question.type === "formula" ? "challenge" : "standard"
            };
          }
          if (question.difficulty === "basic" && index > 1) {
            return { ...question, difficulty: "standard" };
          }
          return question;
        });
      }

      function cleanInlineMarkdown(text) {
        return String(text || "")
          .replace(/\r/g, "")
          .replace(/!\[[^\]]*\]\([^)]+\)/g, "")
          .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")
          .replace(/<br\s*\/?>/gi, " ")
          .replace(/&nbsp;/gi, " ")
          .replace(/\*\*/g, "")
          .replace(/\*/g, "")
          .replace(/~~/g, "")
          .replace(/`/g, "")
          .trim();
      }

      function countQuestionMarkers(referenceText) {
        const matches = String(referenceText || "").match(
          /(?:^|\n)\s*(?:#{1,6}\s*)?(?:問(?:題)?\s*\d+|Q(?:uestion)?[\s._-]*\d+|\d+\s*[.)．])/gim
        );
        return matches ? matches.length : 0;
      }

      function splitQuestionBlocks(referenceText) {
        const lines = String(referenceText || "")
          .replace(/\r\n?/g, "\n")
          .split("\n");
        const blocks = [];
        let current = [];

        lines.forEach((rawLine) => {
          const line = cleanInlineMarkdown(rawLine);
          const trimmed = line.trim();

          if (!trimmed) {
            if (current.length && current[current.length - 1] !== "") {
              current.push("");
            }
            return;
          }

          const isQuestionStart = /^(?:#{1,6}\s*)?(?:問(?:題)?\s*\d+|Q(?:uestion)?[\s._-]*\d+|\d+\s*[.)．])\s*/i.test(
            trimmed
          );

          if (isQuestionStart && current.length) {
            blocks.push(current.join("\n").trim());
            current = [trimmed];
            return;
          }

          current.push(trimmed);
        });

        if (current.length) {
          blocks.push(current.join("\n").trim());
        }

        return blocks.filter(Boolean);
      }

      function toChoiceLabelIndex(value) {
        const normalized = normalizeText(value).toUpperCase();
        const kanaLabels = ["ア", "イ", "ウ", "エ", "オ", "カ"];
        const kanaIndex = kanaLabels.indexOf(normalized);
        if (kanaIndex >= 0) {
          return kanaIndex;
        }
        if (/^[A-D]$/.test(normalized)) {
          return normalized.charCodeAt(0) - 65;
        }
        if (/^\d+$/.test(normalized)) {
          return Math.max(0, Number(normalized) - 1);
        }
        return -1;
      }

      function resolveChoiceAnswer(answerText, choices) {
        if (!choices.length) return answerText;
        const labelIndex = toChoiceLabelIndex(answerText);
        if (labelIndex >= 0 && labelIndex < choices.length) {
          return choices[labelIndex];
        }
        const normalizedAnswer = normalizeText(answerText);
        const exact = choices.find((choice) => normalizeText(choice) === normalizedAnswer);
        return exact || answerText;
      }

      function extractFormulaSymbols(text) {
        return Array.from(new Set((String(text || "").match(/[A-Za-z\u0391-\u03C9]+/g) || []).map((token) => token.trim()))).slice(
          0,
          8
        );
      }

      function getQuestionExplanation(question) {
        const raw = String(question.explanation || "").trim();
        const answerText = String(
          question.answer || question.answer_latex || question.model_answer || ""
        ).trim();
        if (raw && !isStructuralMarkdownLine(raw) && raw !== answerText && raw.length >= 10) {
          return raw;
        }

        if (question.type === "multiple_choice") {
          return question.answer
            ? "正解は「" + question.answer + "」です。この問題では " + question.topic + " の基本事項を確認します。"
            : "正しい選択肢を確認しましょう。";
        }
        if (question.type === "fill_blank") {
          return question.answer
            ? "空欄には「" + question.answer + "」が入ります。関連する用語の意味もあわせて確認しましょう。"
            : "空欄に入る語句を確認しましょう。";
        }
        if (question.type === "formula") {
          return buildFormulaExplanation(question);
        }
        return question.model_answer
          ? "模範解答の要点: " + question.model_answer + " 重要語句と説明の流れを押さえると得点しやすくなります。"
          : "重要語句を含めて説明できるかを確認しましょう。";
      }

      function buildFormulaExplanation(question) {
        const formula = String(question.answer_latex || "").trim();
        if (!formula) return "式の形を確認しましょう。";
        if (/E_?\{?0\}?/.test(formula) && /V_?\{?n\}?/.test(formula)) {
          return "正しい式は " + formula + " です。無負荷電圧と定格電圧の差を基準電圧で割ると、電圧変動率が分かります。";
        }
        if (/Ks/.test(formula) && /Zs/.test(formula)) {
          return "正しい式は " + formula + " です。短絡比と同期インピーダンスは逆の関係なので、向きを入れ替えないことが大切です。";
        }
        if (/V\s*=\s*I\s*R|V\s*=\s*R\s*I/.test(formula.replace(/\s+/g, ""))) {
          return "正しい式は " + formula + " です。電圧は、流れる電流と抵抗の大きさで決まります。";
        }
        return "正しい式は " + formula + " です。どの量を求める式か、記号の意味と分子・分母の向きを確認しましょう。";
      }

      function isWeakExplanation(question, raw, answerText) {
        if (!raw || isStructuralMarkdownLine(raw) || raw.length < 10) return true;
        if (raw === answerText) return true;
        if (/式に当てはめて順に計算すると求めやすくなります/.test(raw)) return true;
        if (/問題文の主語と結果を対応させると、空欄に入る基本用語を選びやすくなります/.test(raw)) return true;
        if (/^模範解答の要点[:：]/.test(raw)) return true;
        if (/^(?:正解|答え)は[「『]?.+[」』]?です。?$/.test(raw)) return true;
        if (question.type === "written" && normalizeText(raw).includes(normalizeText(question.model_answer || ""))) return true;
        return false;
      }

      function buildMultipleChoiceExplanation(question) {
        const answer = String(question.answer || "").trim();
        if (!answer) return "正解の選択肢が何を表すかを確認しましょう。";
        return `正解は「${answer}」です。問題文が聞いている内容と、各選択肢の意味を1つずつ対応させると選びやすくなります。`;
      }

      function buildFillBlankExplanation(question) {
        const answer = String(question.answer || "").trim();
        if (!answer) return "空欄に入る用語や数値を確認しましょう。";
        if (question.answer_mode === "numeric") {
          return `答えは「${answer}」です。使う値と単位を先に整理してから計算すると、取り違えを減らせます。`;
        }
        if (/横流|循環電流/.test(answer + " " + question.question)) {
          return `答えは「${answer}」です。並行運転の条件がそろわないと発電機どうしの間にこの電流が流れるので、現象と用語を結び付けて覚えると理解しやすいです。`;
        }
        if (/固定子/.test(answer)) {
          return `答えは「${answer}」です。固定子は回転せず外側にある部分で、回転子と対になる基本用語として覚えると整理しやすいです。`;
        }
        if (/回転子/.test(answer)) {
          return `答えは「${answer}」です。回転子は軸と一緒に回る部分なので、固定子との違いをセットで覚えると分かりやすいです。`;
        }
        if (/励磁/.test(answer)) {
          return `答えは「${answer}」です。励磁は磁束をつくるための働きなので、電圧を発生させる前提になる言葉として押さえておきましょう。`;
        }
        if (/短絡比/.test(answer)) {
          return `答えは「${answer}」です。短絡比は同期発電機の特性を見る基本量なので、定義に使う界磁電流と一緒に覚えると定着しやすいです。`;
        }
        return `答えは「${answer}」です。${question.topic || "この分野"}で使う基本用語なので、前後の文が何を説明しているかと結び付けて覚えると忘れにくくなります。`;
      }

      function buildWrittenExplanation(question) {
        const keywords = Array.isArray(question.keywords) ? question.keywords.filter(Boolean) : [];
        const modelAnswer = String(question.model_answer || "").trim();
        if (keywords.length >= 2) {
          return `この問題では「${keywords[0]}」と「${keywords[1]}」が特に大切です。結論を先に書き、その後に理由や仕組みを続けると伝わりやすい答えになります。`;
        }
        if (keywords.length === 1) {
          return `この問題では「${keywords[0]}」を正しく使えることがポイントです。その語句がなぜ重要かまで一言添えると、より良い答案になります。`;
        }
        if (modelAnswer) {
          return `模範解答の要点は「${summarizeText(modelAnswer, 36)}」です。短くてもよいので、結論と理由の順でまとめると採点されやすくなります。`;
        }
        return "重要語句を入れながら、結論と理由を分けて書けるかを確認しましょう。";
      }

      function buildFormulaExplanationRich(question) {
        const formula = extractPrimaryFormulaAnswer(String(question.answer_latex || "").trim());
        if (!formula) return "式の形と、各記号が何を表すかを確認しましょう。";
        if (/E_?\{?0\}?/.test(formula) && /V_?\{?n\}?/.test(formula)) {
          return `正しい式は ${formula} です。無負荷電圧と定格電圧の差を基準電圧で割ると、電圧変動率の大きさを比べられます。`;
        }
        if (/V/.test(formula) && /E_?\{?0\}?/.test(formula) && (/ΔV|△V/.test(question.question + formula) || /内部降下|内部電圧降下/.test(question.question))) {
          return `この問題は左辺に端子電圧 V を置く式を求めています。ΔV は内部で生じる電圧降下を表し、誘導起電力 E0 からその分だけ差し引いたものが端子電圧になります。`;
        }
        if (/(K_?\{?s\}?|Ks)/.test(formula) && /Ifs|If0/.test(formula)) {
          return `正しい式は ${formula} です。短絡比は、定格短絡電流に対応する界磁電流と、定格電圧を出す界磁電流の比として覚えると整理しやすいです。`;
        }
        if (/(N_?\{?s\}?|Ns)/.test(formula) && /f/.test(formula) && /p/.test(formula)) {
          return `正しい式は ${formula} です。周波数が高いほど回転は速くなり、極数や極対数が多いほど回転は遅くなる関係を表しています。`;
        }
        if (/V\s*=\s*I\s*R|V\s*=\s*R\s*I/.test(formula.replace(/\s+/g, ""))) {
          return `正しい式は ${formula} です。電圧は、流れる電流と抵抗の大きさで決まるという基本関係を表しています。`;
        }
        return `正しい式は ${formula} です。どの量を求める式なのかを意識して、分子と分母、または左右の量の意味を確認すると覚えやすくなります。`;
      }

      function isWeakExplanationV2(question, raw, answerText) {
        if (!raw || isStructuralMarkdownLine(raw) || raw.length < 10) return true;
        if (raw === answerText) return true;
        if (/式に当てはめて順に計算すると求めやすくなります/.test(raw)) return true;
        if (/問題文の主語と結果を対応させると、空欄に入る基本用語を選びやすくなります/.test(raw)) return true;
        if (/基本用語なので、前後の文が何を説明しているかと結び付けて覚えると忘れにくくなります/.test(raw)) return true;
        if (/空欄の前後が何を説明しているかを確かめると判断しやすくなります/.test(raw)) return true;
        if (/^模範解答の要点[:：]/.test(raw)) return true;
        if (/^(?:正解|答え)は[「『"]?.+[」』"]?です。?$/.test(raw)) return true;
        if (question.type === "written" && normalizeText(raw).includes(normalizeText(question.model_answer || ""))) return true;
        return false;
      }

      function summarizeFillBlankPrompt(questionText) {
        return String(questionText || "")
          .replace(/【[^】]*】/g, "空欄")
          .replace(/\[[^\]]*\]/g, "空欄")
          .replace(/_{2,}/g, "空欄")
          .replace(/\s+/g, " ")
          .replace(/[。．].*$/, "")
          .trim();
      }

      function buildFillBlankExplanationV2(question) {
        const answer = String(question.answer || "").trim();
        if (!answer) return "空欄に入る用語や数値を確認しましょう。";
        const text = String(question.question || "");
        const prompt = summarizeFillBlankPrompt(text);
        if (question.answer_mode === "numeric") {
          return `答えは「${answer}」です。${prompt || "この問題"}では、使う式と単位を先に決めてから計算するとミスを減らせます。`;
        }
        if (/分巻/.test(text) && /界磁巻線/.test(text) && /電機子巻線/.test(text) && /接続/.test(text) && /並列/.test(answer)) {
          return `答えは「${answer}」です。分巻発電機の「分巻」は、界磁巻線と電機子巻線を並列につなぐことを表します。名前と接続方法をセットで覚えると判断しやすくなります。`;
        }
        if (/直巻/.test(text) && /界磁巻線/.test(text) && /電機子巻線/.test(text) && /接続/.test(text) && /直列/.test(answer)) {
          return `答えは「${answer}」です。直巻発電機の「直巻」は、界磁巻線と電機子巻線を直列につなぐことを表します。機械の名前と接続方法を対応させると覚えやすいです。`;
        }
        if (/横流/.test(answer) && /並行運転/.test(text)) {
          return `答えは「${answer}」です。並行運転の条件がそろわないと、発電機どうしの差を打ち消すように横流が流れます。何が原因で何が流れるのかを因果関係で読むと答えやすくなります。`;
        }
        if (/固定子/.test(answer)) {
          return `答えは「${answer}」です。固定子は回転機の外側にあり、名前のとおり回らない部分を表します。回転する回転子との違いを位置と役割で覚えると整理しやすいです。`;
        }
        if (/回転子/.test(answer)) {
          return `答えは「${answer}」です。回転子は回転機の中で実際に回る部分です。固定子と対になる用語なので、動くか動かないかで区別すると覚えやすくなります。`;
        }
        if (/誘導起電力/.test(answer)) {
          return `答えは「${answer}」です。誘導起電力は、磁束の変化によって生じる電圧を表す言葉です。何が変化して、何が生じるのかを結び付けて覚えると使いやすくなります。`;
        }
        if (/短絡比/.test(answer)) {
          return `答えは「${answer}」です。短絡比は、回転機の電圧変化のしやすさや安定性を見るときの基本量です。定義だけでなく、何を比べた量かまで押さえると理解しやすくなります。`;
        }
        if (/並列|直列/.test(answer) && /接続/.test(text)) {
          return `答えは「${answer}」です。${prompt || "この問題"}では、どの巻線どうしをどのつなぎ方にするかを確かめています。接続方法と機械の名前を対応させると判断しやすくなります。`;
        }
        if (/界磁|電機子|固定子|回転子/.test(text + answer)) {
          return `答えは「${answer}」です。${prompt || "この問題"}では、回転機の各部分の名前や役割を確かめています。用語だけでなく「何をする部分か」まで一緒に覚えると混同しにくくなります。`;
        }
        return `答えは「${answer}」です。${prompt || "この問題"}では、文の中で問われている関係や役割を読み取ることがポイントです。空欄の前後が何を説明しているかを確かめると判断しやすくなります。`;
      }

      function getDisplayQuestionExplanation(question) {
        const raw = String(question.explanation || "").trim();
        const answerText = String(question.answer || question.answer_latex || question.model_answer || "").trim();
        if (!isWeakExplanationV2(question, raw, answerText)) {
          return raw;
        }
        if (question.type === "multiple_choice") return buildMultipleChoiceExplanation(question);
        if (question.type === "fill_blank") return buildFillBlankExplanationV2(question);
        if (question.type === "formula") return buildFormulaExplanationRich(question);
        return buildWrittenExplanation(question);
      }

      function repairQuestionRecord(question) {
        if (!question) return;
        if (question.type === "fill_blank") {
          if (!Array.isArray(question.acceptable_answers) || !question.acceptable_answers.length) {
            question.acceptable_answers = question.answer_mode === "numeric"
              ? buildNumericAcceptableAnswers(question.answer)
              : buildAcceptableAnswers(question.answer);
          }
        }
        if (question.type === "formula") {
          question.answer_latex = extractPrimaryFormulaAnswer(question.answer_latex || "");
          question.acceptable_latex = buildFormulaAcceptableLatex(question.answer_latex);
          if (!Array.isArray(question.symbols) || !question.symbols.length) {
            question.symbols = extractFormulaSymbols(question.answer_latex);
          }
        }
        if (isWeakExplanationV2(question, String(question.explanation || "").trim(), String(question.answer || question.answer_latex || question.model_answer || "").trim())) {
          question.explanation = getDisplayQuestionExplanation(question);
        }
      }

      function simplifyQuestionText(text, audience) {
        let value = String(text || "").trim();
        if (!value) return value;
        value = value
          .replace(/記述せよ/g, "書いてください")
          .replace(/求めよ/g, "求めてください")
          .replace(/表せ。/g, "表してください。")
          .replace(/用いること。/g, "使って答えてください。")
          .replace(/正しいものはどれか。/g, "正しいものはどれですか。")
          .replace(/含まれないものはどれか。/g, "入らないものはどれですか。")
          .replace(/必要がある。/g, "必要です。")
          .replace(/一致させることである。/g, "一致させることです。");
        if (audience === "beginner") {
          value = value
            .replace(/起電力/g, "発電して生じる電圧")
            .replace(/界磁巻線/g, "界磁巻線（磁界を作るコイル）")
            .replace(/電機子/g, "電機子")
            .replace(/同期インピーダンス/g, "同期インピーダンス")
            .replace(/短絡比/g, "短絡比");
        }
        return value;
      }

      function adaptQuestionForAudience(question, audience) {
        const next = { ...question };
        next.question = simplifyQuestionText(question.question, audience);
        next.explanation = simplifyQuestionText(getDisplayQuestionExplanation(question), audience);
        if (question.answer_mode) {
          next.answer_mode = question.answer_mode;
        }
        if (question.type === "written") {
          next.model_answer = simplifyQuestionText(question.model_answer, audience);
          if (audience === "beginner" && question.keywords && question.keywords.length && String(question.model_answer || "").length <= 28) {
            next.type = "fill_blank";
            next.answer = question.keywords[0];
            next.acceptable_answers = buildAcceptableAnswers(question.keywords[0]);
            next.question = simplifyQuestionText((question.topic || "この用語") + "について、もっとも大切な言葉を答えてください。", audience);
            next.explanation = simplifyQuestionText("答えは「" + question.keywords[0] + "」です。まずは重要語句を1つずつ覚えるところから始めましょう。", audience);
            delete next.model_answer;
            delete next.keywords;
            delete next.scoring;
          }
        }
        if (question.type === "multiple_choice" && audience === "beginner" && question.choices) {
          next.choices = question.choices.map((choice) => simplifyQuestionText(choice, audience));
          next.answer = simplifyQuestionText(question.answer, audience);
        }
        return next;
      }

      function splitQuestionDisplay(question) {
        const raw = String(question && question.question ? question.question : "").trim();
        const markerMatch = raw.match(/^(.*?)\s*問い\s*[:：]\s*(.+)$/);
        if (markerMatch) {
          return {
            title: markerMatch[1].trim(),
            prompt: markerMatch[2].trim()
          };
        }
        return {
          title: "",
          prompt: raw
        };
      }

      function splitFormulaResponse(value) {
        const source = String(value || "").trim();
        const parts = source.match(/^(.*?)=(.*)$/);
        return parts
          ? { lhs: parts[1].trim(), rhs: parts[2].trim() }
          : { lhs: "", rhs: source };
      }

      function buildFormulaTargetHint(question) {
        const formula = extractPrimaryFormulaAnswer(String(question.answer_latex || "").trim());
        if (!formula) return "";
        const parts = splitEquation(formula);
        if (!parts.lhs) return "";
        if (/ΔV|△V/.test(question.question + formula) || /内部降下|内部電圧降下/.test(question.question)) {
          return `この問題では左辺に ${parts.lhs} を置きます。ΔV は内部降下を表します。`;
        }
        return `この問題では左辺に ${parts.lhs} を置いて式を書きます。`;
      }

      function normalizeFormulaSnippet(value) {
        let text = String(value || "").normalize("NFKC").trim();
        if (!text) return "";
        text = text.replace(/([A-Za-zΑ-Ωα-ω0-9])_([A-Za-zΑ-Ωα-ω0-9]+)/g, "$1_{$2}");
        text = text.replace(/([A-Za-zΑ-Ωα-ω0-9}])\^([A-Za-zΑ-Ωα-ω0-9+\-]+)/g, "$1^{$2}");
        return text;
      }

      function ensureFormulaDraft(question) {
        if (!state.formulaDrafts[question.id]) {
          const split = splitFormulaResponse(state.responses[question.id] || "");
          state.formulaDrafts[question.id] = {
            lhs: normalizeFormulaSnippet(split.lhs),
            rhs: normalizeFormulaSnippet(split.rhs),
            activeSide: split.rhs ? "rhs" : "lhs"
          };
        }
        return state.formulaDrafts[question.id];
      }

      function buildFormulaResponseFromDraft(draft) {
        const lhs = normalizeFormulaSnippet(draft && draft.lhs ? draft.lhs : "");
        const rhs = normalizeFormulaSnippet(draft && draft.rhs ? draft.rhs : "");
        if (lhs && rhs) return lhs + " = " + rhs;
        if (lhs) return lhs;
        if (rhs) return rhs;
        return "";
      }

      function syncFormulaResponse(questionId) {
        const draft = state.formulaDrafts[questionId];
        if (!draft) return;
        state.responses[questionId] = buildFormulaResponseFromDraft(draft);
      }

      function refreshFormulaPreview(questionId) {
        const draft = state.formulaDrafts[questionId];
        if (!draft) return;
        const preview = document.querySelector(`[data-formula-preview="${questionId}"]`);
        if (preview) {
          preview.innerHTML = renderFormulaPreview(draft);
        }
      }

      function renderInlineFormulaHtml(text) {
        const source = String(text || "");
        const commandMap = {
          alpha: "α",
          beta: "β",
          gamma: "γ",
          delta: "δ",
          Delta: "Δ",
          theta: "θ",
          lambda: "λ",
          mu: "μ",
          rho: "ρ",
          sigma: "σ",
          omega: "ω",
          Omega: "Ω",
          pi: "π",
          varphi: "φ",
          times: "×",
          div: "÷",
          cdot: "・"
        };
        let index = 0;

        function parseGroup() {
          if (source[index] === "{") {
            index += 1;
            const content = parseSequence("}");
            return content;
          }
          return parseAtom();
        }

        function parseScript() {
          if (source[index] === "{") {
            index += 1;
            return parseSequence("}");
          }
          return parseAtom();
        }

        function applyScripts(baseHtml) {
          let html = baseHtml;
          while (source[index] === "_" || source[index] === "^") {
            const marker = source[index];
            index += 1;
            const scriptHtml = parseScript();
            html = marker === "_"
              ? `${html}<sub>${scriptHtml}</sub>`
              : `${html}<sup>${scriptHtml}</sup>`;
          }
          return html;
        }

        function parseAtom() {
          if (index >= source.length) return "";

          if (source[index] === "\\") {
            index += 1;
            const commandMatch = source.slice(index).match(/^[A-Za-z]+/);
            const command = commandMatch ? commandMatch[0] : "";
            if (command) {
              index += command.length;
            }

            if (command === "frac") {
              const numerator = parseGroup();
              const denominator = parseGroup();
              const fracHtml = `<span style="display:inline-grid;justify-items:center;line-height:1.08;vertical-align:middle;"><span>${numerator || '<span class="formula-preview-empty">□</span>'}</span><span style="width:100%;border-top:2px solid currentColor;margin:2px 0;"></span><span>${denominator || '<span class="formula-preview-empty">□</span>'}</span></span>`;
              return applyScripts(fracHtml);
            }

            if (command === "sqrt") {
              const radicand = parseGroup();
              return applyScripts(`√<span style="display:inline-block;border-top:2px solid currentColor;padding-top:2px;">${radicand}</span>`);
            }

            const symbol = commandMap[command] || ("\\" + command);
            return applyScripts(escapeHtml(symbol));
          }

          if (source[index] === "{") {
            index += 1;
            return applyScripts(parseSequence("}"));
          }

          const char = source[index];
          index += 1;
          return applyScripts(escapeHtml(char));
        }

        function parseSequence(stopChar) {
          let html = "";
          while (index < source.length) {
            if (stopChar && source[index] === stopChar) {
              index += 1;
              break;
            }
            html += parseAtom();
          }
          return html;
        }

        return parseSequence("");
      }

      function renderFormulaPreview(draft) {
        const lhs = String(draft && draft.lhs ? draft.lhs : "").trim();
        const rhs = String(draft && draft.rhs ? draft.rhs : "").trim();
        return `
          <div class="formula-preview-equation">
            <span>${lhs ? renderInlineFormulaHtml(lhs) : '<span class="formula-preview-empty">□</span>'}</span>
            <span>=</span>
            <span>${rhs ? renderInlineFormulaHtml(rhs) : '<span class="formula-preview-empty">□</span>'}</span>
          </div>
        `;
      }

      function scrollToExamTop() {
        if (typeof window !== "undefined" && typeof window.scrollTo === "function") {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }

      function formulaPaletteButtons() {
        const greek = [
          ["ρ", "ロー"], ["α", "アルファ"], ["β", "ベータ"], ["γ", "ガンマ"], ["δ", "デルタ"], ["ε", "イプシロン"],
          ["λ", "ラムダ"], ["μ", "ミュー"], ["π", "パイ"], ["σ", "シグマ"], ["ω", "オメガ"], ["Ω", "オーム"], ["φ", "ファイ"], ["θ", "シータ"]
        ];
        const ops = [
          ["frac", "a⁄b", "分数"], ["sup", "x²", "指数"], ["sub", "m₁", "下付き"], ["sqrt", "√", "平方根"],
          ["×", "×", "かける"], ["÷", "÷", "わる"], ["+", "+", "たす"], ["-", "−", "ひく"], ["(", "(", "左かっこ"], [")", ")", "右かっこ"]
        ];

        return {
          greek: greek
            .map(([value, label]) => `
              <button class="formula-button" type="button" data-formula-insert="${escapeHtml(value)}">
                <span class="formula-button-main">${escapeHtml(value)}</span>
                <span class="formula-button-sub">${escapeHtml(label)}</span>
              </button>
            `)
            .join(""),
          ops: ops
            .map(([value, visual, label]) => `
              <button class="formula-button" type="button" data-formula-insert="${escapeHtml(value)}" ${["frac", "sup", "sub", "sqrt"].includes(value) ? 'data-formula-structure="1"' : ""}>
                <span class="formula-button-main">${escapeHtml(visual)}</span>
                <span class="formula-button-sub">${escapeHtml(label)}</span>
              </button>
            `)
            .join("")
        };
      }

      function formulaModalFields(type) {
        if (type === "frac") {
          return [
            { key: "numerator", label: "分子", placeholder: "例: m_1, x^2, V" },
            { key: "denominator", label: "分母", placeholder: "例: R_2, n^2" }
          ];
        }
        if (type === "sup") {
          return [
            { key: "base", label: "底", placeholder: "例: x, m_1" },
            { key: "exponent", label: "指数", placeholder: "例: 2, n-1" }
          ];
        }
        if (type === "sub") {
          return [
            { key: "base", label: "文字", placeholder: "例: m" },
            { key: "subscript", label: "下付き", placeholder: "例: 1" }
          ];
        }
        return [{ key: "radicand", label: "根号の中", placeholder: "例: R_1^2 + X^2" }];
      }

      function formulaModalTitle(type) {
        return {
          frac: "分数を追加",
          sup: "指数を追加",
          sub: "下付きを追加",
          sqrt: "平方根を追加"
        }[type] || "数式要素を追加";
      }

      function trimLastFormulaUnit(value) {
        const text = String(value || "");
        const patterns = [
          /\\frac\{[^{}]*\}\{[^{}]*\}\s*$/,
          /\\sqrt\{[^{}]*\}\s*$/,
          /[A-Za-zΑ-Ωα-ω0-9]+\^\{[^{}]*\}\s*$/,
          /[A-Za-zΑ-Ωα-ω0-9]+_\{[^{}]*\}\s*$/,
          /.\s*$/
        ];
        for (const pattern of patterns) {
          if (pattern.test(text)) {
            return text.replace(pattern, "");
          }
        }
        return text.slice(0, -1);
      }

      function visibleQuestionsForTest(test) {
        return (test && Array.isArray(test.questions) ? test.questions : []).filter((question) => question.isPublished !== false);
      }

      function topicSummaryFromQuestions(questions) {
        const counts = new Map();
        (questions || []).forEach((question) => {
          const topic = String(question.topic || "").trim();
          if (!topic) return;
          counts.set(topic, (counts.get(topic) || 0) + 1);
        });
        return Array.from(counts.entries()).sort((left, right) => right[1] - left[1]);
      }

      function dominantTopicForTest(test) {
        const entries = topicSummaryFromQuestions((test && test.questionPool && test.questionPool.length ? test.questionPool : test && test.questions) || []);
        return entries[0] ? entries[0][0] : "";
      }

      function buildThemeBasedTitle(theme) {
        return theme ? theme + " 理解チェック" : "基礎理解チェック";
      }

      function inferThemeFromText(text) {
        const source = String(text || "");
        if (/誘導電動機|三相誘導電動機|かご形|巻線形|すべり|同期速度|始動電流/.test(source)) return "誘導電動機";
        if (/回転機|直流発電機|同期発電機|誘導発電機|励磁|短絡比/.test(source)) return "回転機";
        if (/電気理論/.test(source)) return "電気理論";
        if (/電気回路|オーム|電流|電圧|抵抗/.test(source)) return "電気回路";
        if (/力学|速度|加速度|質量/.test(source)) return "力学";
        if (/化学|分子|原子|反応/.test(source)) return "化学基礎";
        return "";
      }

      function preferredThemeForTest(test) {
        const fromSource = inferThemeFromText(test && test.sourceTopic);
        if (fromSource) return fromSource;
        const fromTitle = inferThemeFromText(test && test.title);
        if (fromTitle) return fromTitle;
        const fromSummary = inferThemeFromText(test && test.referenceSummary);
        if (fromSummary) return fromSummary;
        const fromQuestions = dominantTopicForTest(test);
        return fromQuestions || "";
      }

      function buildThemeBasedSubtitle(test) {
        const visibleQuestions = visibleQuestionsForTest(test);
        const types = Array.from(new Set(visibleQuestions.map((question) => TYPE_LABELS[question.type]).filter(Boolean)));
        const topicEntries = topicSummaryFromQuestions(visibleQuestions);
        const theme = preferredThemeForTest(test) || (topicEntries[0] ? topicEntries[0][0] : dominantTopicForTest(test));
        const typeText = types.length ? types.join("・") : "基礎";
        return theme
          ? theme + "の重要ポイントを確認する" + typeText + "テストです。"
          : typeText + "で基礎を確認するテストです。";
      }

      function takerDisplayTitle(test) {
        const customTitle = String(test && test.title ? test.title : "").trim();
        if (customTitle) return customTitle;
        const theme = preferredThemeForTest(test);
        return buildThemeBasedTitle(theme);
      }

      function takerDisplaySubtitle(test) {
        const description = String(test && test.description ? test.description : "").trim();
        if (description && !/参照ファイルから生成したテストです。|未公開の下書きデータです。/.test(description)) {
          return description;
        }
        return buildThemeBasedSubtitle(test);
      }

      function buildGeneratedTestTitle(referenceFileName, test) {
        const theme = preferredThemeForTest({ ...test, sourceTopic: referenceFileName });
        if (theme) {
          return buildThemeBasedTitle(theme);
        }
        return referenceFileName.replace(/\.[^.]+$/, "") + " テスト";
      }

      function buildAcceptableAnswers(answerText) {
        const raw = String(answerText || "").trim();
        const variants = new Set([raw]);

        raw
          .split(/[\/／,，、]|または|あるいは/g)
          .map((part) => part.trim())
          .filter(Boolean)
          .forEach((part) => variants.add(part));

        if (raw) {
          variants.add(raw.replace(/\s+/g, ""));
        }

        return Array.from(variants).filter(Boolean);
      }

      function extractNumericAnswer(answerText) {
        const text = String(answerText || "").replace(/\s+/g, " ").trim();
        const matches = Array.from(text.matchAll(/(-?\d+(?:\.\d+)?)\s*(?:\[\s*([%A-Za-z]+)\s*\]|([%％]))?/g));
        if (!matches.length) return "";
        const last = matches[matches.length - 1];
        const value = last[1];
        const unit = last[2] || last[3] || "";
        if (!unit) return value;
        if (unit === "％") return value + "%";
        return value + unit;
      }

      function buildNumericAcceptableAnswers(answerText) {
        const primary = extractNumericAnswer(answerText);
        const variants = new Set();
        if (primary) {
          variants.add(primary);
          variants.add(primary.replace(/\s+/g, ""));
          variants.add(primary.replace(/\[%\]/g, "%"));
          if (/%$/.test(primary)) {
            variants.add(primary.replace(/%$/, ""));
            variants.add(primary.replace(/%$/, "％"));
          }
        }
        return Array.from(variants).filter(Boolean);
      }

      function parseQuestionHeader(line) {
        const match = String(line || "").match(
          /^(?:#{1,6}\s*)?(?:(?:問(?:題)?\s*(\d+)|Q(?:uestion)?[\s._-]*(\d+))\s*[.)．]?\s*|(\d+)\s*[.)．]\s*)(.*)$/i
        );
        return match
          ? {
              number: match[1] || match[2] || match[3] || "",
              text: (match[4] || "").replace(/^[.)、．]+\s*/, "").trim()
            }
          : null;
      }

      function inferQuestionType(questionText, answerText, choices) {
        const joined = [questionText, answerText].join(" ");
        if (choices.length >= 2) return "multiple_choice";
        if (/_{2,}|（\s*）|\(\s*\)|\[+\s*\]+|【[^】]*】|空欄|穴埋め/.test(joined)) return "fill_blank";
        if (
          /数値問題|いくつ|何%|何％|求めよ|計算/.test(questionText) &&
          buildNumericAcceptableAnswers(answerText).length
        ) {
          return "fill_blank";
        }
        if (
          /計算式|定義式|関係式|式を記述|表せ|求めよ|数値計算/.test(questionText) &&
          /[=＝\/×÷+\-]/.test(answerText)
        ) {
          return "formula";
        }
        if (/\\frac|\\sqrt|\^\{|\_\{|[A-Za-z\u0391-\u03C9]\s*=\s*[^。,\n]+|公式|LaTeX|数式/.test(joined)) {
          return "formula";
        }
        return "written";
      }

      function parseMarkdownQuestions(referenceText, fallbackTopic) {
        const blocks = splitQuestionBlocks(referenceText);
        return blocks
          .map((block) => {
            const lines = block
              .split("\n")
              .map((line) => cleanInlineMarkdown(line))
              .filter(Boolean);

            if (!lines.length) return null;

            const header = parseQuestionHeader(lines[0]);
            if (!header) return null;

            let questionText = header.text;
            const questionParts = [];
            const choices = [];
            let answerText = "";
            let explanation = "";
            let collectingAnswer = false;

            for (let index = 1; index < lines.length; index += 1) {
              const line = lines[index];

              if (isStructuralMarkdownLine(line)) {
                if (collectingAnswer) {
                  collectingAnswer = false;
                }
                continue;
              }

              if (!questionText && !questionParts.length) {
                const nextHeader = parseQuestionHeader(line);
                if (!nextHeader) {
                  questionParts.push(line);
                  continue;
                }
              }

              if (collectingAnswer) {
                if (/^(?:必須キーワード|採点基準|減点ルール)\s*[:：]?/.test(line)) {
                  collectingAnswer = false;
                  continue;
                }
                const explanationWhileAnswer = line.match(/^(?:解説|説明|ポイント|補足)\s*[:：]\s*(.+)$/);
                if (explanationWhileAnswer) {
                  collectingAnswer = false;
                  explanation = explanationWhileAnswer[1].trim();
                  continue;
                }
                answerText = [answerText, line].filter(Boolean).join(" ");
                continue;
              }

              const answerMatch = line.match(/^(?:答え|解答|模範解答|解答例|正解|回答)\s*[:：]\s*(.*)$/);
              if (answerMatch) {
                answerText = answerMatch[1].trim();
                collectingAnswer = !answerText;
                continue;
              }

              const explanationMatch = line.match(/^(?:解説|説明|ポイント|補足)\s*[:：]\s*(.+)$/);
              if (explanationMatch) {
                explanation = explanationMatch[1].trim();
                continue;
              }

              const alphaChoiceMatch = line.match(/^(?:[-*+]\s*)?([A-DＡ-Ｄa-dア-オｱ-ｵ])[\.\):：、]\s*(.+)$/);
              if (alphaChoiceMatch) {
                choices.push(alphaChoiceMatch[2].trim());
                continue;
              }

              const numericChoiceMatch = line.match(/^(?:[-*+]\s*)?([1-9０-９][0-9０-９]*)[\.\):：、]\s*(.+)$/);
              if (
                numericChoiceMatch &&
                (choices.length > 0 || /次から|選択|選べ|どれ|正しいもの|誤っているもの/.test([questionText].concat(questionParts).join(" ")))
              ) {
                choices.push(numericChoiceMatch[2].trim());
                continue;
              }

              const bulletChoiceMatch = line.match(/^[-*+]\s+(.+)$/);
              if (bulletChoiceMatch && (choices.length > 0 || /次から|選択|選べ|どれ/.test([questionText].concat(questionParts).join(" ")))) {
                choices.push(bulletChoiceMatch[1].trim());
                continue;
              }

              if (!answerText && !explanation && /^(?:備考|注|補記)\s*[:：]\s*/.test(line)) {
                continue;
              }

              if (/^(?:必須キーワード|採点基準|減点ルール)\s*[:：]?/.test(line)) {
                continue;
              }

              if (!answerText) {
                questionParts.push(line);
              } else if (!explanation) {
                explanation = line;
              }
            }

            if (!questionText) {
              questionText = questionParts.shift() || "";
            }

            if (questionParts.length) {
              questionText = [questionText].concat(questionParts).filter(Boolean).join(" ");
            }

            questionText = questionText.trim();
            if (!questionText) return null;

            const topic = detectTopic(questionText + "\n" + answerText, extractTerms(questionText + " " + answerText)) || fallbackTopic;
            const type = inferQuestionType(questionText, answerText, choices);
            const importantTerms = extractTerms([topic, questionText, answerText, explanation].join(" ")).slice(0, 6);

            if (type === "multiple_choice") {
              const resolvedAnswer = resolveChoiceAnswer(answerText, choices);
              return {
                id: createId("Q"),
                type,
                difficulty: "basic",
                topic,
                question: questionText,
                choices,
                answer: resolvedAnswer || choices[0] || "",
                explanation: explanation || (resolvedAnswer ? "正解は「" + resolvedAnswer + "」です。" : ""),
                important_terms: importantTerms,
                isPublished: true
              };
            }

            if (type === "fill_blank") {
              const acceptableAnswers = /数値問題|いくつ|何%|何％|求めよ|計算/.test(questionText)
                ? buildNumericAcceptableAnswers(answerText)
                : buildAcceptableAnswers(answerText);
              const finalAnswer = acceptableAnswers[0] || answerText || "";
              return {
                id: createId("Q"),
                type,
                difficulty: "basic",
                topic,
                question: questionText,
                answer: finalAnswer,
                acceptable_answers: acceptableAnswers,
                answer_mode: /数値問題|いくつ|何%|何％|求めよ|計算/.test(questionText) ? "numeric" : "text",
                explanation:
                  explanation || (finalAnswer ? "答えは「" + finalAnswer + "」です。式に当てはめて順に計算すると求めやすくなります。" : "空欄を確認しましょう。"),
                important_terms: importantTerms,
                isPublished: true
              };
            }

            if (type === "formula") {
              const formulaText = extractPrimaryFormulaAnswer(answerText) || extractFormula(questionText) || extractFormula(referenceText) || "a = b + c";
              return {
                id: createId("Q"),
                type,
                difficulty: "basic",
                topic,
                question: questionText,
                explanation: explanation || (formulaText ? "正しい式は " + formulaText + " です。" : "式の形と記号の対応を確認しましょう。"),
                important_terms: importantTerms,
                answer_latex: formulaText,
                acceptable_latex: buildFormulaAcceptableLatex(formulaText),
                symbols: extractFormulaSymbols(formulaText),
                isPublished: true
              };
            }

            const modelAnswer = answerText || explanation || "要点をまとめて説明してください。";
            const keywords = extractTerms(modelAnswer).slice(0, 4);
            return {
              id: createId("Q"),
              type: "written",
              difficulty: "standard",
              topic,
              question: questionText,
              explanation: explanation || (modelAnswer ? "模範解答の要点: " + modelAnswer : "重要語句を含めて説明できるかを確認します。"),
              important_terms: importantTerms,
              model_answer: modelAnswer,
              keywords,
              scoring: { total: 10, keyword_points: 6, context_points: 4 },
              isPublished: true
            };
          })
          .filter(Boolean);
      }

      function buildWrittenFeedback(question, userAnswer, matched) {
        const keywords = Array.isArray(question.keywords) ? question.keywords.filter(Boolean) : [];
        const missing = keywords.filter((keyword) => !matched.includes(keyword));
        if (!String(userAnswer || "").trim()) {
          return "未回答です。まず結論を1文で書き、その後に理由や仕組みを足すと点が入りやすくなります。";
        }
        if (matched.length && missing.length) {
          return `「${matched.join("」「")}」は書けています。次は「${missing.slice(0, 2).join("」「")}」も入れると、正解に近づきます。`;
        }
        if (matched.length) {
          return "重要語句は押さえられています。結論のあとに理由や条件まで書けると、さらに安定した答案になります。";
        }
        if (keywords.length) {
          return `重要語句の「${keywords.slice(0, 2).join("」「")}」を入れて、結論から先に書くと伝わりやすくなります。`;
        }
        return "結論を先に書き、そのあとに理由や仕組みを1文添えると、採点されやすい答案になります。";
      }

      function normalizeFormulaForScoring(value) {
        const prepared = String(value || "")
          .replace(/([A-Za-z]+)\s*_\s*\{\s*([A-Za-z0-9+\-]+)\s*\}/g, "$1$2")
          .replace(/([A-Za-z]+)\s*\{\s*([A-Za-z0-9+\-]+)\s*\}/g, "$1$2")
          .replace(/([A-Za-z]+)\s+([A-Za-z0-9])/g, "$1$2")
          .replace(/[（(]\s*(?:例|注|備考|でも可)[^）)]*[）)]/g, "")
          .replace(/\[[^\]]*(?:rpm|hz|kw|mw|va|a|v|w|%|pu|unit|単位)[^\]]*\]/gi, "")
          .replace(/(?:例|注|備考)\s*[:：].*$/g, "")
          .replace(/_/g, "");
        return normalizeLatex(prepared);
      }

      function scoreQuestion(question, userAnswer, test) {
        if (question.type === "multiple_choice") {
          const isCorrect = normalizeText(userAnswer) === normalizeText(question.answer);
          return {
            questionId: question.id,
            earnedPoints: isCorrect ? questionMaxPoints(question, test) : 0,
            maxPoints: questionMaxPoints(question, test),
            isCorrect,
            feedback: isCorrect ? "正解です。" : "不正解です。",
            expectedAnswer: question.answer,
            userAnswer
          };
        }

        if (question.type === "fill_blank") {
          const accepts = [question.answer].concat(question.acceptable_answers).map(normalizeText);
          const isCorrect = accepts.includes(normalizeText(userAnswer));
          return {
            questionId: question.id,
            earnedPoints: isCorrect ? questionMaxPoints(question, test) : 0,
            maxPoints: questionMaxPoints(question, test),
            isCorrect,
            feedback: isCorrect ? "正解です。" : "不正解です。",
            expectedAnswer: question.answer,
            userAnswer
          };
        }

        if (question.type === "formula") {
          const accepts = buildFormulaAccepts(question);
          const normalizedUserAnswer = normalizeFormulaForScoring(userAnswer);
          const isCorrect =
            accepts.some((expected) => areFormulasEquivalent(expected, userAnswer)) ||
            accepts.map(normalizeFormulaForScoring).includes(normalizedUserAnswer);
          return {
            questionId: question.id,
            earnedPoints: isCorrect ? questionMaxPoints(question, test) : 0,
            maxPoints: questionMaxPoints(question, test),
            isCorrect,
            feedback: isCorrect ? "公式を正しく入力できています。" : "不正解です。",
            expectedAnswer: extractPrimaryFormulaAnswer(question.answer_latex),
            userAnswer
          };
        }

        const matched = question.keywords.filter((keyword) =>
          normalizeText(userAnswer).includes(normalizeText(keyword))
        );
        const keywordRatio = question.keywords.length ? matched.length / question.keywords.length : 0;
        const keywordPoints = Math.round(question.scoring.keyword_points * keywordRatio);
        const contextRatio = userAnswer.trim().length >= 25 ? 0.5 : userAnswer.trim() ? 0.25 : 0;
        const contextPoints = Math.round(
          question.scoring.context_points * Math.min(1, keywordRatio + contextRatio)
        );
        const maxPoints = questionMaxPoints(question, test);
        const earned = Math.min(maxPoints, keywordPoints + contextPoints);
        return {
          questionId: question.id,
          earnedPoints: earned,
          maxPoints,
          isCorrect: earned >= Math.ceil(maxPoints * 0.6),
          feedback: matched.length
            ? "仮採点です。キーワード一致: " + matched.join("、")
            : "仮採点です。重要キーワードが少ないため加点が伸びていません。",
          expectedAnswer: question.model_answer,
          userAnswer
        };
      }

      function gradeTest(test, responses) {
        const breakdowns = test.questions.map((question) => scoreQuestion(question, responses[question.id] || "", test));
        const totalPoints = breakdowns.reduce((sum, item) => sum + item.earnedPoints, 0);
        const maxPoints = breakdowns.reduce((sum, item) => sum + item.maxPoints, 0);
        return {
          percentage: maxPoints ? Math.round((totalPoints / maxPoints) * 100) : 0,
          totalPoints,
          maxPoints,
          breakdowns
        };
      }

          heroTitle.textContent = "1級施工管理 誘導電動機テスト";
          heroSubtitle.textContent = "管理者設定と受験画面を切り替えながら、誘導電動機のテストを作成・受験できます。";
          heroTags.innerHTML = `
            <span class="hero-pill">管理者設定</span>
            <span class="hero-pill teal">受験対応</span>
            <span class="hero-pill orange">スマホ最適化</span>
          `;
          return;
        }

        const publishedTests = state.tests.filter((test) => test.published);
        const activeTest = publishedTests.find((test) => test.id === state.activeTestId) || null;

        if (activeTest) {
          const visibleQuestions = visibleQuestionsForTest(activeTest);
          const topic = dominantTopicForTest(activeTest);
          heroTitle.textContent = takerDisplayTitle(activeTest);
          heroSubtitle.textContent = buildThemeBasedSubtitle(activeTest);
          heroTags.innerHTML = `
            <span class="hero-pill">${escapeHtml(topic || "受験中")}</span>
            <span class="hero-pill teal">${visibleQuestions.length}問</span>
            <span class="hero-pill orange">${escapeHtml(state.result ? "採点結果を表示中" : "受験中")}</span>
          `;
          return;
        }

        const topicNames = Array.from(new Set(publishedTests.map((test) => dominantTopicForTest(test)).filter(Boolean)));
        heroTitle.textContent = topicNames.length === 1 ? buildThemeBasedTitle(topicNames[0]) : "テーマ別 公開テスト一覧";
        heroSubtitle.textContent = topicNames.length
          ? topicNames.slice(0, 3).join("・") + " の公開テストから選んで受験できます。"
          : "公開中のテーマ別テストを選んで受験できます。";
        heroTags.innerHTML = `
          <span class="hero-pill">受験者画面</span>
          <span class="hero-pill teal">${publishedTests.length}テスト公開中</span>
          <span class="hero-pill orange">テーマ別に受験</span>
        `;
      }
