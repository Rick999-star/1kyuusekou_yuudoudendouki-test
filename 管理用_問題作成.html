<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1級施工管理 誘導電動機テスト</title>
    <style>
      :root {
        --bg: #eef3f8;
        --surface: #ffffff;
        --surface-soft: #f7fafc;
        --text: #163046;
        --muted: #62788d;
        --line: #d9e3ec;
        --navy: #1d5d8f;
        --teal: #12836d;
        --orange: #dd7b39;
        --violet: #6b67c8;
        --red: #cf5c5c;
        --sky: #e9f5ff;
        --mint: #e9f8f2;
        --sand: #fff3e8;
        --lavender: #f1efff;
        --danger-soft: #fff0f0;
        --ok-soft: #ecfbf3;
        --shadow: 0 18px 48px rgba(25, 46, 66, 0.10);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
        font-family: "Yu Gothic UI", "BIZ UDPGothic", "Hiragino Sans", sans-serif;
        color: var(--text);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(29, 93, 143, 0.12), transparent 28%),
          radial-gradient(circle at right top, rgba(221, 123, 57, 0.10), transparent 22%),
          linear-gradient(180deg, #f3f7fb 0%, #eef3f8 100%);
        color: var(--text);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(100%, 1380px);
        margin: 0 auto;
        padding: 14px;
      }

      .hero {
        display: grid;
        gap: 16px;
        padding: 18px;
        border-radius: var(--radius-xl);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(247, 250, 252, 0.96)),
          linear-gradient(135deg, rgba(29, 93, 143, 0.05), rgba(18, 131, 109, 0.04));
        box-shadow: var(--shadow);
        margin-bottom: 16px;
      }

      .hero-title {
        margin: 0;
        font-family: "Yu Gothic UI", "BIZ UDPGothic", "Hiragino Sans", sans-serif;
        font-size: clamp(1.55rem, 4.8vw, 2.5rem);
        line-height: 1.18;
        letter-spacing: 0.01em;
        font-weight: 900;
      }

      .hero-subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
        font-weight: 700;
      }

      .hero-tags,
      .summary-grid,
      .switches,
      .quick-metrics,
      .question-tags,
      .toolbar-row,
      .compact-list,
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .hero-pill,
      .tag,
      .meta-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
      }

      .hero-pill {
        background: var(--sky);
        color: var(--navy);
      }

      .hero-pill.teal {
        background: var(--mint);
        color: var(--teal);
      }

      .hero-pill.orange {
        background: var(--sand);
        color: var(--orange);
      }

      .hero-bottom {
        display: grid;
        gap: 14px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        padding: 14px 14px 12px;
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: inset 0 0 0 1px rgba(217, 227, 236, 0.7);
      }

      .metric strong {
        display: block;
        font-size: clamp(1.5rem, 5vw, 2.2rem);
        line-height: 1;
        margin-bottom: 8px;
      }

      .metric.tests strong {
        color: var(--navy);
      }

      .metric.live strong {
        color: var(--teal);
      }

      .metric.count strong {
        color: var(--orange);
      }

      .metric span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .switches {
        padding: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: inset 0 0 0 1px rgba(217, 227, 236, 0.8);
      }

      .switches button {
        flex: 1 1 0;
        min-width: 120px;
        min-height: 48px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-weight: 800;
      }

      .switches button.active {
        background: linear-gradient(135deg, var(--navy), var(--teal));
        color: white;
        box-shadow: 0 10px 24px rgba(23, 87, 135, 0.20);
      }

      .layout {
        display: grid;
        gap: 16px;
      }

      .panel,
      .exam-card,
      .question-card,
      .result-card,
      .login-card {
        background: rgba(255, 255, 255, 0.94);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
      }

      .panel,
      .exam-card,
      .question-card,
      .login-card {
        padding: 18px;
      }

      .panel-title {
        margin: 0 0 14px;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0.02em;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .field input,
      .field textarea,
      .field select,
      .answer-input,
      .answer-textarea,
      .formula-textarea {
        width: 100%;
        padding: 14px 15px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--surface);
        color: var(--text);
      }

      .field textarea,
      .answer-textarea,
      .formula-textarea {
        resize: vertical;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .help {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .divider {
        height: 1px;
        margin: 18px 0;
        background: var(--line);
      }

      .upload-box {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 108px;
        border: 2px dashed #bfd2e2;
        border-radius: var(--radius-lg);
        background:
          linear-gradient(135deg, rgba(233, 245, 255, 0.85), rgba(255, 255, 255, 0.85));
        text-align: center;
        padding: 16px;
      }

      .upload-box input {
        position: absolute;
        inset: 0;
        opacity: 0;
      }

      .btn,
      .btn-soft,
      .btn-alert {
        min-height: 46px;
        padding: 10px 16px;
        border-radius: 999px;
        border: none;
        font-weight: 800;
      }

      .btn {
        background: linear-gradient(135deg, var(--navy), var(--teal));
        color: white;
      }

      .btn-soft {
        background: #f5f9fc;
        color: var(--navy);
        border: 1px solid var(--line);
      }

      .btn-alert {
        background: var(--sand);
        color: var(--orange);
        border: 1px solid #f0d0b8;
      }

      .button-row {
        align-items: center;
      }

      .settings-card {
        padding: 14px;
        border-radius: var(--radius-md);
        background: linear-gradient(135deg, var(--lavender), rgba(255, 255, 255, 0.7));
        border: 1px solid #dddaf5;
      }

      .test-list,
      .question-list,
      .exam-list {
        display: grid;
        gap: 10px;
      }

      .list-card,
      .question-chip {
        width: 100%;
        padding: 14px;
        text-align: left;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        background: var(--surface-soft);
      }

      .list-card.active,
      .question-chip.active {
        border-color: #a8c7e0;
        background: linear-gradient(135deg, #edf6ff, #f7fbff);
      }

      .list-card strong,
      .question-chip strong {
        display: block;
        margin-bottom: 5px;
      }

      .chip-meta {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 24px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
      }

      .status-pill.live {
        background: var(--mint);
        color: var(--teal);
      }

      .status-pill.off {
        background: var(--danger-soft);
        color: var(--red);
      }

      .chip-text {
        font-size: 14px;
        line-height: 1.55;
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px;
        border-radius: var(--radius-md);
        background: var(--mint);
        font-weight: 700;
      }

      .editor-type-formula .editor-banner,
      .editor-type-written .editor-banner,
      .editor-type-multiple_choice .editor-banner,
      .editor-type-fill_blank .editor-banner {
        padding: 12px 14px;
        border-radius: var(--radius-md);
        margin-bottom: 14px;
        font-size: 13px;
        font-weight: 800;
      }

      .editor-type-formula .editor-banner {
        background: var(--lavender);
        color: var(--violet);
      }

      .editor-type-written .editor-banner {
        background: var(--sand);
        color: var(--orange);
      }

      .editor-type-multiple_choice .editor-banner {
        background: var(--sky);
        color: var(--navy);
      }

      .editor-type-fill_blank .editor-banner {
        background: var(--mint);
        color: var(--teal);
      }

      .formula-box,
      .preview-box {
        padding: 14px;
        border-radius: var(--radius-md);
        background: #f7fbff;
        border: 1px solid #dce8f1;
      }

      .question-heading {
        display: grid;
        gap: 10px;
      }

      .question-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: linear-gradient(135deg, #edf5ff, #f8fbff);
        color: var(--navy);
        font-size: 12px;
        font-weight: 800;
        width: fit-content;
      }

      .question-kicker-label {
        color: var(--muted);
      }

      .question-title {
        margin: 0;
        font-size: 18px;
        line-height: 1.5;
        font-weight: 900;
      }

      .toolbar-group {
        display: grid;
        gap: 8px;
      }

      .toolbar-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .toolbar-chip {
        min-height: 40px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid #d6e4ef;
        background: white;
        color: var(--navy);
        font-weight: 700;
      }

      .formula-preview {
        min-height: 52px;
        padding: 12px 14px;
        border-radius: var(--radius-md);
        background: white;
        overflow-x: auto;
      }

      .formula-workflow {
        display: grid;
        gap: 14px;
      }

      .formula-help-card {
        padding: 16px 18px;
        border-radius: var(--radius-md);
        background: linear-gradient(135deg, rgba(233, 245, 255, 0.85), rgba(255, 255, 255, 0.96));
        border: 1px solid #cfe0f0;
        color: #45546a;
        font-size: 14px;
        line-height: 1.85;
      }

      .formula-help-card strong {
        color: var(--text);
      }

      .formula-editor-shell {
        display: grid;
        gap: 14px;
        padding: 16px;
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid #d7e5f1;
      }

      .equation-row {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 10px;
        align-items: end;
      }

      .formula-side-group {
        display: grid;
        gap: 8px;
      }

      .formula-side-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .formula-side-input {
        width: 100%;
        min-height: 74px;
        padding: 14px 16px;
        border-radius: var(--radius-md);
        border: 2px solid #cddced;
        background: #ffffff;
        color: var(--text);
        font-size: 22px;
        line-height: 1.35;
        transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
      }

      .formula-side-input.active,
      .formula-side-input:focus {
        outline: none;
        border-color: #ef6b1c;
        box-shadow: 0 0 0 4px rgba(239, 107, 28, 0.12);
        background: #fffdfa;
      }

      .formula-equals {
        padding: 0 4px 18px;
        font-size: clamp(2rem, 5vw, 2.7rem);
        font-weight: 900;
        color: var(--navy);
      }

      .formula-preview-stage {
        min-height: 82px;
        display: grid;
        place-items: center;
        padding: 14px 16px;
        border-radius: var(--radius-md);
        background: linear-gradient(135deg, rgba(233, 245, 255, 0.6), rgba(255, 255, 255, 0.96));
        border: 1px solid #d7e5f1;
        overflow-x: auto;
      }

      .formula-preview-equation {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
      }

      .formula-preview-empty {
        color: #a2b2c4;
      }

      .palette-heading {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      .palette-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .formula-button {
        min-width: 76px;
        min-height: 74px;
        padding: 8px 10px;
        border-radius: 18px;
        border: 1px solid #c8d9ea;
        background: #ffffff;
        color: var(--text);
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-weight: 800;
      }

      .formula-button:hover {
        background: #f5fbff;
      }

      .formula-button-main {
        font-size: 22px;
        line-height: 1;
      }

      .formula-button-sub {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.2;
      }

      .formula-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .formula-btn-lite {
        min-height: 52px;
        padding: 10px 18px;
        border-radius: 16px;
        border: 1px solid #c8d9ea;
        background: #ffffff;
        color: var(--navy);
        font-weight: 800;
      }

      .formula-btn-lite.danger {
        border-color: #ef6b1c;
        color: #ef6b1c;
      }

      .formula-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(18, 37, 58, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
      }

      .formula-modal-card {
        width: min(100%, 420px);
        padding: 20px;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 18px 48px rgba(17, 37, 58, 0.24);
        display: grid;
        gap: 12px;
      }

      .formula-modal-title {
        margin: 0;
        font-size: 18px;
        font-weight: 900;
      }

      .formula-modal-hint {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .formula-mini-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .formula-mini-grid.single {
        grid-template-columns: 1fr;
      }

      .formula-mini-field {
        display: grid;
        gap: 6px;
      }

      .formula-mini-field input {
        width: 100%;
        min-height: 46px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid #c8d9ea;
      }

      .formula-modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .formula-fallback {
        font-family: "Consolas", "Courier New", monospace;
        color: var(--navy);
      }

      .login-wrap,
      .empty-state {
        display: grid;
        place-items: center;
        min-height: 220px;
        text-align: center;
      }

      .login-card {
        width: min(100%, 560px);
      }

      .exam-card {
        position: relative;
        overflow: hidden;
      }

      .exam-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 8px;
        background: linear-gradient(180deg, var(--navy), var(--teal));
      }

      .exam-card-body {
        padding-left: 10px;
      }

      .exam-head {
        display: grid;
        gap: 12px;
      }

      .question-card {
        position: relative;
        overflow: hidden;
        display: grid;
        gap: 14px;
      }

      .question-card.type-multiple_choice {
        border-top: 8px solid var(--navy);
      }

      .question-card.type-fill_blank {
        border-top: 8px solid var(--teal);
      }

      .question-card.type-written {
        border-top: 8px solid var(--orange);
      }

      .question-card.type-formula {
        border-top: 8px solid var(--violet);
      }

      .q-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .q-number {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--navy), var(--teal));
        color: white;
        font-weight: 900;
        flex: 0 0 auto;
      }

      .question-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        padding: 7px 11px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
      }

      .tag.type {
        background: var(--sky);
        color: var(--navy);
      }

      .tag.level {
        background: var(--sand);
        color: var(--orange);
      }

      .tag.topic {
        background: var(--mint);
        color: var(--teal);
      }

      .q-text {
        font-size: 17px;
        line-height: 1.75;
        font-weight: 700;
      }

      .choices {
        display: grid;
        gap: 10px;
      }

      .choice {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        background: var(--surface-soft);
      }

      .choice.active {
        background: #edf6ff;
        border-color: #9fc0da;
      }

      .choice span {
        font-weight: 700;
      }

      .mini-help {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .result-card {
        padding: 16px;
        border-radius: var(--radius-md);
        line-height: 1.7;
      }

      .result-card.ok {
        background: var(--ok-soft);
        border: 1px solid #cdecd9;
      }

      .result-card.ng {
        background: var(--danger-soft);
        border: 1px solid #f2d3d3;
      }

      .result-title {
        font-weight: 900;
        margin-bottom: 6px;
      }

      .score-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px;
      }

      .score-main strong {
        display: block;
        font-size: clamp(2rem, 8vw, 3.1rem);
        line-height: 1;
        color: var(--navy);
      }

      .score-main span {
        color: var(--muted);
        font-weight: 700;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 759px) {
        .equation-row {
          grid-template-columns: 1fr;
        }

        .formula-equals {
          padding: 0;
          text-align: center;
        }

        .formula-side-input {
          min-height: 68px;
          font-size: 20px;
        }

        .formula-button {
          min-width: 70px;
          min-height: 68px;
        }
      }

      @media (min-width: 760px) {
        .app {
          padding: 20px;
        }

        .hero {
          padding: 24px;
        }

        .hero-bottom {
          grid-template-columns: 1fr auto;
          align-items: end;
        }

        .two-col {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .exam-head {
          grid-template-columns: 1fr auto;
          align-items: center;
        }
      }

      @media (min-width: 1180px) {
        .hero {
          grid-template-columns: 1.3fr 0.9fr;
          align-items: start;
        }

        .layout {
          grid-template-columns: 0.95fr 1.05fr 1.15fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div>
          <h1 id="hero-title" class="hero-title">1級施工管理 誘導電動機テスト</h1>
          <p id="hero-subtitle" class="hero-subtitle">管理者設定と受験画面を切り替えながら、誘導電動機のテストを作成・受験できます。</p>
          <div id="hero-tags" class="hero-tags">
            <span class="hero-pill">管理者設定</span>
            <span class="hero-pill teal">受験対応</span>
            <span class="hero-pill orange">スマホ最適化</span>
          </div>
        </div>
        <div class="hero-bottom">
          <div class="summary-grid">
            <div class="metric tests">
              <strong id="metric-tests">0</strong>
              <span>テスト</span>
            </div>
            <div class="metric live">
              <strong id="metric-published">0</strong>
              <span>公開中</span>
            </div>
            <div class="metric count">
              <strong id="metric-questions">0</strong>

      function shuffleArray(items) {
        const list = items.slice();
        for (let index = list.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          const current = list[index];
          list[index] = list[swapIndex];
          list[swapIndex] = current;
        }
        return list;
      }

      function sanitizeQuestion(question) {
        const next = {
          ...question,
          isPublished: question.isPublished !== false

      function isStructuralMarkdownLine(line) {
        const trimmed = String(line || "").trim();
        return !trimmed || /^-{3,}$/.test(trimmed) || /^_{3,}$/.test(trimmed) || /^>{3,}$/.test(trimmed);
      }

      function clampQuestionSelectionCount(count, total) {
        if (!total) return 0;
        const normalized = Number(count);
        if (!Number.isFinite(normalized)) return Math.min(total, 20);
        return Math.max(1, Math.min(total, Math.round(normalized)));
      }

      function ensureTestQuestionPool(test) {
        if (!test.scoringConfig) {
          test.scoringConfig = {
            multiple_choice: 5,
            fill_blank: 5,
            written: 10,
            formula: 10
          };
        }
        const sourcePool =
          Array.isArray(test.questionPool) && test.questionPool.length ? test.questionPool : Array.isArray(test.questions) ? test.questions : [];
        const pool = sourcePool.map(sanitizeQuestion);
        const poolById = new Map(pool.map((question) => [question.id, question]));
        const selectedSource =
          Array.isArray(test.questions) && test.questions.length
            ? test.questions
            : pool.slice(0, clampQuestionSelectionCount(test.questionSelectionCount, pool.length) || pool.length);

        const selected = selectedSource.map((question) => {
          const existing = poolById.get(question.id);
          if (existing) return existing;
          const next = sanitizeQuestion(question);
          pool.push(next);
          poolById.set(next.id, next);
          return next;
        });

        test.questionPool = pool;
        test.questions = selected;
        test.questionSelectionCount = clampQuestionSelectionCount(
          test.questionSelectionCount || selected.length || pool.length,
          pool.length
        );

        if (!test.questions.length && pool.length) {
          test.questions = pool.slice(0, test.questionSelectionCount);
        }
      }

      function pickQuestionSet(questionPool, count, shouldShuffle) {
        const order =
          (state.settings.generationAudience || "beginner") === "beginner"
            ? ["multiple_choice", "fill_blank", "multiple_choice", "fill_blank", "written", "formula"]
            : ["multiple_choice", "fill_blank", "written", "formula"];
        const grouped = Object.fromEntries(
          Array.from(new Set(order)).map((type) => [
            type,
            (questionPool || []).filter((question) => question.type === type)
          ])
        );
        order.forEach((type) => {
          if (shouldShuffle) {
            grouped[type] = shuffleArray(grouped[type]);
          }
        });

        const selected = [];
        let hasProgress = true;
        while (selected.length < count && hasProgress) {
          hasProgress = false;
          order.forEach((type) => {
            if (selected.length >= count) return;
            if (grouped[type] && grouped[type].length) {
              selected.push(grouped[type].shift());
              hasProgress = true;
            }
          });
        }

        return selected;
      }

      function applyQuestionSelection(test, shouldShuffle) {

        test.questionSelectionCount = count;

      function createId(prefix) {
        if (window.crypto && crypto.randomUUID) {
          return prefix + "-" + crypto.randomUUID().slice(0, 8);

        return prefix + "-" + Math.random().toString(36).slice(2, 10);
